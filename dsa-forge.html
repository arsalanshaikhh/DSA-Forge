/* ── STATE ── */
const S={view:'dash',cat:'array',patId:null,prob:null,editor:null,hintsOpen:0,solRevealed:false,descTab:'desc',diffFilter:'all',solved:{},attempted:{}};

function loadProg(){try{S.solved=JSON.parse(localStorage.getItem('dsf_solved')||'{}');S.attempted=JSON.parse(localStorage.getItem('dsf_att')||'{}');}catch(e){S.solved={};S.attempted={};}}
function saveProg(){try{localStorage.setItem('dsf_solved',JSON.stringify(S.solved));localStorage.setItem('dsf_att',JSON.stringify(S.attempted));}catch(e){}}
function markSolved(id){S.solved[id]=true;S.attempted[id]=true;saveProg();updProg();}
function markAtt(id){if(!S.solved[id]){S.attempted[id]=true;saveProg();}}
function updProg(){const done=Object.keys(S.solved).length,total=PROBLEMS.length;document.getElementById('pfill').style.width=Math.round(done/total*100)+'%';document.getElementById('pnum').textContent=done+'/'+total;}

/* ── NAVIGATION ── */
function showV(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function go_dash(){S.view='dash';showV('v-dash');renderDash();setCrumb([]);}
function go_problems(id){
  const allP=[...PATTERNS.array,...PATTERNS.string];
  const pat=allP.find(p=>p.id===id);
  S.patId=pat?pat.id:null;
  S.cat=pat?(PATTERNS.array.find(p=>p.id===id)?'array':'string'):id;
  S.view='problems';showV('v-problems');renderProblems();
  setCrumb([{label:pat?pat.name:(S.cat==='array'?'Arrays':'Strings'),fn:()=>go_problems(id)}]);
}
function go_solve(id){
  S.prob=PROBLEMS.find(p=>p.id===id);
  if(!S.prob) return;
  S.hintsOpen=0;S.solRevealed=false;S.descTab='desc';
  S.view='solve';showV('v-solve');renderSolve();
  setCrumb([{label:S.prob.tech,fn:()=>go_problems(S.prob.techId)},{label:S.prob.title}]);
}
function setCrumb(items){
  const el=document.getElementById('crumb');
  if(!items.length){el.innerHTML='';return;}
  el.innerHTML=items.map((item,i)=>
    i<items.length-1&&item.fn
      ?`<button class="crumb-btn">${item.label}</button><span>&#8250;</span>`
      :`<span class="act-crumb">${item.label}</span>`
  ).join('');
  el.querySelectorAll('.crumb-btn').forEach((btn,i)=>{const fn=items.filter(x=>x.fn)[i];if(fn)btn.onclick=fn.fn;});
}

/* ── DASHBOARD ── */
function renderDash(){
  const done=Object.keys(S.solved).length,total=PROBLEMS.length;
  const easy=PROBLEMS.filter(p=>p.diff==='Easy'&&S.solved[p.id]).length;
  const med=PROBLEMS.filter(p=>p.diff==='Medium'&&S.solved[p.id]).length;
  const hard=PROBLEMS.filter(p=>p.diff==='Hard'&&S.solved[p.id]).length;
  const eT=PROBLEMS.filter(p=>p.diff==='Easy').length;
  const mT=PROBLEMS.filter(p=>p.diff==='Medium').length;
  const hT=PROBLEMS.filter(p=>p.diff==='Hard').length;
  let h=`<div class="dash-hero"><h1>Learn DSA <em>by Pattern</em></h1><p>Master algorithms through patterns — understand the technique once, apply it everywhere. Each pattern includes explanation, examples, hints, and a live judge.</p></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-n" style="color:var(--arr)">${done}<span style="font-size:.9rem;color:var(--dim)">/${total}</span></div><div class="stat-l">Solved</div></div>
    <div class="stat-box"><div class="stat-n" style="color:var(--easy)">${easy}<span style="font-size:.9rem;color:var(--dim)">/${eT}</span></div><div class="stat-l">Easy</div></div>
    <div class="stat-box"><div class="stat-n" style="color:var(--med)">${med}<span style="font-size:.9rem;color:var(--dim)">/${mT}</span></div><div class="stat-l">Medium</div></div>
    <div class="stat-box"><div class="stat-n" style="color:var(--hard)">${hard}<span style="font-size:.9rem;color:var(--dim)">/${hT}</span></div><div class="stat-l">Hard</div></div>
  </div>`;
  ['array','string'].forEach(cat=>{
    const col=cat==='array'?'var(--arr)':'var(--str)';
    h+=`<div class="cat-row"><div class="cat-lbl" style="color:${col}">${cat.toUpperCase()} PATTERNS</div><div class="pattern-grid">`;
    PATTERNS[cat].forEach(pat=>{
      const ps=PROBLEMS.filter(p=>p.cat===cat&&p.techId===pat.id);
      const sc=ps.filter(p=>S.solved[p.id]).length;
      const pct=ps.length?Math.round(sc/ps.length*100):0;
      const iBg=cat==='array'?'rgba(74,158,255,.1)':'rgba(255,95,133,.1)';
      h+=`<div class="pc ${cat}" onclick="go_problems('${pat.id}')">
        <div class="pc-icon" style="background:${iBg};color:${pat.col}">${pat.icon}</div>
        <div class="pc-name">${pat.name}</div>
        <div class="pc-desc">${pat.desc}</div>
        <div class="pc-foot"><span class="pc-cnt">${ps.length} problems</span><span class="pc-prog" style="color:${sc===ps.length&&ps.length?'var(--ok)':pat.col}">${sc}/${ps.length}</span></div>
        <div class="pc-bar"><div class="pc-bar-fill" style="width:${pct}%;background:${pat.col}"></div></div>
      </div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('v-dash').innerHTML=h;
}

/* ── PROBLEM LIST ── */
function renderProblems(){
  const pat=[...PATTERNS.array,...PATTERNS.string].find(p=>p.id===S.patId);
  const col=S.cat==='array'?'var(--arr)':'var(--str)';
  const filtered=getFiltered();
  document.getElementById('pl-hdr').innerHTML=`<div class="pl-top">
    <button class="back-btn" onclick="go_dash()">&#8592; Dashboard</button>
    <span class="pl-title" style="color:${col}">${pat?pat.name:(S.cat==='array'?'Array':'String')} Problems</span>
    <span class="pl-meta">${filtered.length} problems</span>
    <div class="diff-tabs">
      <button class="dtab ${S.diffFilter==='all'?'on-all':''}" onclick="setDiff('all')">All</button>
      <button class="dtab ${S.diffFilter==='Easy'?'on-easy':''}" onclick="setDiff('Easy')">Easy</button>
      <button class="dtab ${S.diffFilter==='Medium'?'on-med':''}" onclick="setDiff('Medium')">Medium</button>
      <button class="dtab ${S.diffFilter==='Hard'?'on-hard':''}" onclick="setDiff('Hard')">Hard</button>
    </div>
  </div>`;
  renderProbTable();
}
function getFiltered(){return PROBLEMS.filter(p=>(S.patId?p.techId===S.patId:p.cat===S.cat)&&(S.diffFilter==='all'||p.diff===S.diffFilter));}
function setDiff(d){S.diffFilter=d;renderProblems();}
function renderProbTable(){
  const probs=getFiltered();
  const col=S.cat==='array'?'var(--arr)':'var(--str)';
  document.getElementById('pl-tbody').innerHTML=probs.map(p=>{
    const sv=S.solved[p.id],at=S.attempted[p.id];
    const dc=p.diff==='Easy'?'d-easy':p.diff==='Medium'?'d-med':'d-hard';
    return `<tr onclick="go_solve(${p.id})">
      <td class="td-s"><span class="sdot ${sv?'sdot-ok':'sdot-no'}"></span></td>
      <td class="td-n">${p.id}</td>
      <td class="td-title-cell">${p.title}${sv?' <span style="color:var(--ok);font-size:.7rem">&#10003;</span>':''}</td>
      <td class="td-tech" style="color:${col}">${p.tech}</td>
      <td><span class="diff-badge ${dc}">${p.diff}</span></td>
    </tr>`;
  }).join('');
}

/* ── SOLVE VIEW ── */
function renderSolve(){
  const p=S.prob;
  const col=p.cat==='array'?'var(--arr)':'var(--str)';
  const dc=p.diff==='Easy'?'d-easy':p.diff==='Medium'?'d-med':'d-hard';
  const pp=PROBLEMS.filter(x=>x.techId===p.techId);
  const idx=pp.findIndex(x=>x.id===p.id);
  document.getElementById('dp-num').textContent='#'+p.id;
  document.getElementById('dp-title-txt').textContent=p.title;
  const prev=document.getElementById('nav-prev'),next=document.getElementById('nav-next');
  prev.disabled=idx<=0;next.disabled=idx>=pp.length-1;
  prev.onclick=()=>idx>0&&go_solve(pp[idx-1].id);
  next.onclick=()=>idx<pp.length-1&&go_solve(pp[idx+1].id);

  // Build all pane contents
  const exH=p.examples.map((ex,i)=>`<div class="ex-block"><div class="ex-lbl">Example ${i+1}</div><div class="ex-line"><span class="ek">Input:&nbsp;&nbsp;</span><span class="ev">${ex.input}</span></div><div class="ex-line"><span class="ek">Output: </span><span class="ev">${ex.output}</span></div>${ex.note?`<div class="ex-line"><span class="en">// ${ex.note}</span></div>`:''}</div>`).join('');
  const descH=`<div class="prob-heading"><h2>${p.title}</h2><span class="diff-badge ${dc}">${p.diff}</span><span class="diff-badge" style="background:${p.cat==='array'?'rgba(74,158,255,.1)':'rgba(255,95,133,.1)'};color:${col}">${p.tech}</span>${S.solved[p.id]?'<span style="color:var(--ok);font-size:.8rem">&#10003; Solved</span>':''}</div>
    <p class="prob-text">${p.desc}</p>
    <div class="sec-hd">Examples</div>${exH}
    <div class="sec-hd" style="margin-top:12px">Constraints</div>
    <ul class="constraints">${p.constraints.map(c=>`<li>${c}</li>`).join('')}</ul>
    <div class="tag-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;

  const apH=`<div class="ap-card"><div class="ap-head"><div class="ap-title">&#127919; ${p.approach.title}</div></div><div class="ap-body">${p.approach.body}<table class="cx-table"><tr><th>Approach</th><th>Time</th><th>Space</th></tr><tr><td style="color:var(--brute)">Brute Force</td><td><span class="cx-t">${p.approach.bt}</span></td><td><span class="cx-s">${p.approach.bs}</span></td></tr><tr><td style="color:var(--opt)">Optimal</td><td><span class="cx-t">${p.approach.ot}</span></td><td><span class="cx-s">${p.approach.os}</span></td></tr></table></div></div>
  <div class="ap-card"><div class="ap-head"><div class="ap-title">&#128273; Key Insight</div></div><div class="ap-body">${p.hints[p.hints.length-1]}</div></div>`;

  function hintsH(){
    let h='';
    p.hints.forEach((hint,i)=>{
      if(i<S.hintsOpen) h+=`<div class="hint-item"><strong style="display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.8px;color:var(--warn);margin-bottom:4px">Hint ${i+1}</strong>${hint}</div>`;
      else h+=`<div class="hint-locked" onclick="revealHint()">&#128274; Reveal Hint ${i+1}</div>`;
    });
    h+=S.hintsOpen<p.hints.length?`<button class="hint-all-btn" onclick="revealAllHints()">Reveal All (${p.hints.length} hints)</button>`:`<div style="text-align:center;font-size:.78rem;color:var(--ok);padding:8px">&#10003; All hints shown</div>`;
    return h;
  }
  function solH(){
    if(!S.solRevealed) return `<div class="sol-locked"><div class="sol-lock-icon">&#128274;</div><div class="sol-lock-txt">Solution is hidden. Give it your best try first — pattern mastery comes from struggling!</div><button class="sol-reveal-btn" onclick="revealSol()">Reveal Solution</button></div>`;
    return `<div class="sol-block"><div class="sol-hd sol-brute-hd">&#128308; Brute Force</div><pre class="sol-pre">${esc(p.bruteSol)}</pre></div><div class="sol-block"><div class="sol-hd sol-opt-hd">&#128994; Optimal Solution</div><pre class="sol-pre">${esc(p.sol)}</pre></div>`;
  }

  const PANES={desc:descH,approach:apH,hints:hintsH(),solution:solH()};
  const body=document.getElementById('dp-body');
  body._panes=PANES;
  body._hintsH=hintsH;
  body._solH=solH;
  body.innerHTML=PANES[S.descTab];
  document.querySelectorAll('.dp-tab').forEach(t=>t.classList.toggle('on',t.dataset.pane===S.descTab));

  initEditor(p.starter,p.id);
  setRaIdle();
}

function switchTab(tab){
  S.descTab=tab;
  document.querySelectorAll('.dp-tab').forEach(t=>t.classList.toggle('on',t.dataset.pane===tab));
  const body=document.getElementById('dp-body');
  const panes=body._panes||{};
  if(tab==='hints'){body._panes.hints=body._hintsH();body.innerHTML=body._panes.hints;}
  else if(tab==='solution'){body._panes.solution=body._solH();body.innerHTML=body._panes.solution;}
  else body.innerHTML=panes[tab]||'';
}
function revealHint(){S.hintsOpen=Math.min(S.hintsOpen+1,S.prob.hints.length);switchTab('hints');}
function revealAllHints(){S.hintsOpen=S.prob.hints.length;switchTab('hints');}
function revealSol(){S.solRevealed=true;switchTab('solution');}

/* ── EDITOR ── */
function initEditor(code,id){
  const wrap=document.getElementById('editor-wrap');
  wrap.innerHTML='';
  S.editor=CodeMirror(wrap,{value:code,mode:'javascript',theme:'dracula',lineNumbers:true,autoCloseBrackets:true,matchBrackets:true,tabSize:2,indentWithTabs:false,extraKeys:{'Ctrl-Enter':()=>runTests(false),'Cmd-Enter':()=>runTests(false)}});
  S.editor.setSize('100%','100%');
  try{const sv=localStorage.getItem('dsf_code_'+id);if(sv)S.editor.setValue(sv);}catch(e){}
  S.editor.on('change',()=>{try{localStorage.setItem('dsf_code_'+id,S.editor.getValue());}catch(e){}});
  setTimeout(()=>S.editor.refresh(),150);
}

/* ── TEST RUNNER ── */
function deepEq(a,b,cmp){
  if(cmp==='sorted'){
    if(!Array.isArray(a)||!Array.isArray(b)) return JSON.stringify(a)===JSON.stringify(b);
    return JSON.stringify([...a].sort((x,y)=>x-y))===JSON.stringify([...b].sort((x,y)=>x-y));
  }
  return JSON.stringify(a)===JSON.stringify(b);
}

function runTests(isSubmit){
  const p=S.prob;if(!p||!S.editor) return;
  const code=S.editor.getValue().trim();if(!code) return;
  markAtt(p.id);
  document.getElementById('ra-status').className='ra-status rs-run';
  document.getElementById('ra-status').textContent='&#9203; running...';
  document.getElementById('ra-body').innerHTML='<div class="idle-msg">Executing...</div>';

  const logs=[];
  const origLog=console.log;
  console.log=(...args)=>{logs.push(args.map(a=>{try{return JSON.stringify(a);}catch(e){return String(a);}}).join(' '));origLog(...args);};

  const results=[];
  const t0=performance.now();
  const tests=isSubmit?p.tests:p.tests.slice(0,3);

  for(const tc of tests){
    try{
      const factory=new Function(code+'\nif(typeof solution==="undefined")throw new Error("No function named \'solution\' found.");return solution;');
      const fn=factory();
      const args=JSON.parse(JSON.stringify(tc.args));
      const res=fn(...args);
      const pass=deepEq(res,tc.expected,p.compare);
      results.push({pass,result:res,expected:tc.expected,label:tc.label,args:tc.args,logs:[...logs]});
    }catch(err){
      results.push({error:err.message,label:tc.label,args:tc.args,logs:[...logs]});
    }
    logs.length=0;
  }
  console.log=origLog;
  const ms=Math.round(performance.now()-t0);

  const allPass=results.every(r=>r.pass);
  const anyErr=results.some(r=>r.error);
  const pc=results.filter(r=>r.pass).length;

  const st=document.getElementById('ra-status');
  if(anyErr){st.className='ra-status rs-err';st.textContent='&#9888; Error';}
  else if(allPass){st.className='ra-status rs-pass';st.textContent=`&#10003; ${isSubmit?'Accepted':'Passed'} (${pc}/${tests.length})`;}
  else{st.className='ra-status rs-fail';st.textContent=`&#10007; ${pc}/${tests.length} passed`;}
  document.getElementById('ra-time').textContent=ms+'ms';

  document.getElementById('ra-body').innerHTML=results.map(r=>{
    const ico=r.error?'&#9888;&#65039;':r.pass?'&#9989;':'&#10060;';
    let detail='';
    if(r.error) detail=`<div class="tc-detail"><span class="e">${esc(r.error)}</span></div>`;
    else if(!r.pass) detail=`<div class="tc-detail">Input: <span class="v">${esc(JSON.stringify(r.args))}</span><br>Expected: <span class="v">${esc(JSON.stringify(r.expected))}</span><br>Got: <span class="e">${esc(JSON.stringify(r.result))}</span></div>`;
    else detail=`<div class="tc-detail">Output: <span class="v">${esc(JSON.stringify(r.result))}</span></div>`;
    const logH=r.logs&&r.logs.length?`<div class="console-out">&#128203; ${r.logs.slice(0,3).map(l=>esc(l)).join('<br>')}</div>`:'';
    return `<div class="tc-row"><span class="tc-ico">${ico}</span><div class="tc-info"><div class="tc-name">${r.label}</div>${detail}${logH}</div></div>`;
  }).join('');

  if(isSubmit&&allPass&&results.length===p.tests.length){markSolved(p.id);celebrate(p);}
}

function setRaIdle(){
  document.getElementById('ra-status').className='ra-status rs-idle';
  document.getElementById('ra-status').textContent='&#8212; waiting';
  document.getElementById('ra-time').textContent='';
  document.getElementById('ra-body').innerHTML='<div class="idle-msg">Write your solution and press Run Tests or Ctrl+Enter.</div>';
}

function celebrate(p){
  const ov=document.createElement('div');ov.className='modal-ov';
  const pp=PROBLEMS.filter(x=>x.techId===p.techId);
  const idx=pp.findIndex(x=>x.id===p.id);
  ov.innerHTML=`<div class="modal-box"><div class="modal-emoji">&#127881;</div><div class="modal-title">Accepted!</div><div class="modal-sub">${esc(p.title)} solved. Pattern: <strong>${esc(p.tech)}</strong></div><div class="modal-cx"><div class="modal-cx-item"><span>Time</span><span class="modal-cx-t">${p.approach.ot}</span></div><div class="modal-cx-item"><span>Space</span><span class="modal-cx-s">${p.approach.os}</span></div></div><div class="modal-btns"><button class="modal-btn" id="cel-close">Close</button><button class="modal-btn modal-btn-ok" id="cel-next">${idx<pp.length-1?'Next Problem &#8594;':'See All Problems'}</button></div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#cel-close').onclick=()=>ov.remove();
  ov.querySelector('#cel-next').onclick=()=>{ov.remove();idx<pp.length-1?go_solve(pp[idx+1].id):go_problems(p.techId);};
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}

/* ── RESIZER ── */
function initResizer(){
  const rs=document.getElementById('resizer'),lp=document.getElementById('desc-panel');
  let drag=false,sx=0,sw=0;
  rs.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sw=lp.offsetWidth;rs.classList.add('drag');document.body.style.userSelect='none';});
  document.addEventListener('mousemove',e=>{if(!drag)return;const w=Math.max(280,Math.min(sw+e.clientX-sx,window.innerWidth-380));lp.style.width=w+'px';});
  document.addEventListener('mouseup',()=>{drag=false;rs.classList.remove('drag');document.body.style.userSelect='';if(S.editor)S.editor.refresh();});
}

/* ── HELPERS ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── EVENTS ── */
document.getElementById('logo-home').addEventListener('click',go_dash);
document.getElementById('back-btn').addEventListener('click',()=>S.patId?go_problems(S.patId):go_dash());
document.getElementById('btn-reset').addEventListener('click',()=>{if(S.editor&&S.prob){S.editor.setValue(S.prob.starter);try{localStorage.removeItem('dsf_code_'+S.prob.id);}catch(e){}}});
document.getElementById('btn-run').addEventListener('click',()=>runTests(false));
document.getElementById('btn-sub').addEventListener('click',()=>runTests(true));
document.getElementById('dp-tabs-row').addEventListener('click',e=>{const b=e.target.closest('.dp-tab');if(b)switchTab(b.dataset.pane);});

/* ── INIT ── */
loadProg();updProg();renderDash();initResizer();
</script>
