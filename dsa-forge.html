<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DSA Forge — Learn Patterns · Practice Problems</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<style>
:root{
  --bg:#07101f;--s1:#0c1929;--s2:#111f32;--s3:#172840;--s4:#1e3352;
  --b1:#1c3050;--b2:#264570;--b3:#305090;
  --text:#b5cce8;--dim:#5a7a9d;--mut:#2a4060;
  --arr:#4a9eff;--str:#ff5f85;
  --easy:#22c55e;--med:#f59e0b;--hard:#ef4444;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --brute:#ffb347;--opt:#2dd4bf;
  --tcol:#a78bfa;--scol:#34d399;
  --hh:56px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b2)}

/* ── HEADER ── */
#hdr{height:var(--hh);background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:1.12rem;font-weight:800;color:#fff;letter-spacing:-.5px;cursor:pointer}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--arr),#1a50cc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.hdr-sep{width:1px;height:20px;background:var(--b1)}
.hdr-crumb{display:flex;align-items:center;gap:6px;font-size:.82rem}
.hdr-crumb span{color:var(--mut)}
.hdr-crumb button{background:none;border:none;color:var(--dim);padding:3px 6px;border-radius:4px;font-size:.82rem;font-weight:500;transition:.15s}
.hdr-crumb button:hover{background:var(--s2);color:var(--text)}
.hdr-crumb .act-crumb{color:var(--text)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.prog-pill{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;font-size:.78rem}
.prog-bar{width:56px;height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--arr);border-radius:2px;transition:width .4s ease}
.prog-num{font-weight:600;color:var(--arr);min-width:32px}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* ─── DASHBOARD ─── */
#v-dash{overflow-y:auto;padding:28px 32px}
.dash-hero{margin-bottom:22px}
.dash-hero h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.2}
.dash-hero h1 em{font-style:normal;color:var(--arr)}
.dash-hero p{color:var(--dim);font-size:.88rem;max-width:520px;line-height:1.6}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:26px}
.stat-box{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px 16px}
.stat-n{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:#fff;line-height:1}
.stat-l{font-size:.72rem;color:var(--dim);margin-top:4px}
.cat-row{margin-bottom:24px}
.cat-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.cat-lbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.pattern-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.pc{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pc.arr::before{background:var(--arr)}
.pc.str::before{background:var(--str)}
.pc:hover{border-color:var(--b2);background:var(--s2);transform:translateY(-2px)}
.pc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:10px}
.pc-name{font-weight:600;font-size:.88rem;color:#fff;margin-bottom:4px}
.pc-desc{font-size:.75rem;color:var(--dim);line-height:1.5;margin-bottom:10px;min-height:36px}
.pc-foot{display:flex;align-items:center;gap:6px;font-size:.74rem}
.pc-cnt{color:var(--dim)}
.pc-prog{margin-left:auto;font-weight:600}
.pc-bar{width:100%;height:3px;background:var(--b1);border-radius:2px;margin-top:8px;overflow:hidden}
.pc-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* ─── PROBLEM LIST ─── */
#v-problems{flex-direction:column}
.pl-hdr{padding:18px 24px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.pl-top{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.pl-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:#fff}
.pl-meta{font-size:.78rem;color:var(--dim)}
.diff-tabs{display:flex;gap:4px;margin-left:auto}
.dtab{padding:4px 11px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--dim);font-size:.76rem;font-weight:500;transition:.15s}
.dtab:hover{background:var(--s2)}
.dtab.on-all{background:var(--s2);color:var(--text);border-color:var(--b1)}
.dtab.on-easy{background:rgba(34,197,94,.1);color:var(--easy);border-color:rgba(34,197,94,.25)}
.dtab.on-med{background:rgba(245,158,11,.1);color:var(--med);border-color:rgba(245,158,11,.25)}
.dtab.on-hard{background:rgba(239,68,68,.1);color:var(--hard);border-color:rgba(239,68,68,.25)}
.pl-wrap{flex:1;overflow-y:auto;padding:0 24px 24px}
.pl-table{width:100%;border-collapse:collapse}
.pl-table thead th{text-align:left;padding:10px 12px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--bg);z-index:2}
.pl-table tbody tr{cursor:pointer;border-bottom:1px solid var(--b1);transition:.12s}
.pl-table tbody tr:hover{background:var(--s2)}
.pl-table tbody td{padding:12px}
.td-s{width:30px;text-align:center}
.td-n{width:50px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--mut)}
.td-title-cell{color:var(--text);font-weight:500;font-size:.87rem}
.td-tech{color:var(--dim);font-size:.76rem}
.diff-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.d-easy{background:rgba(34,197,94,.1);color:var(--easy)}
.d-med{background:rgba(245,158,11,.1);color:var(--med)}
.d-hard{background:rgba(239,68,68,.1);color:var(--hard)}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sdot-ok{background:var(--ok)}
.sdot-no{background:var(--mut)}

/* ─── SOLVE VIEW ─── */
#v-solve{flex-direction:row;overflow:hidden}
.desc-panel{width:42%;min-width:300px;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.dp-topbar{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--s1)}
.dp-num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--mut)}
.dp-title{font-weight:600;font-size:.88rem;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-btns{display:flex;gap:3px}
.nav-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--dim);font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.nav-btn:hover:not(:disabled){background:var(--s2);color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:default}
.dp-tabs-row{display:flex;background:var(--s2);padding:0 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.dp-tab{padding:8px 13px;border:none;background:transparent;color:var(--dim);font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px}
.dp-tab:hover{color:var(--text)}
.dp-tab.on{color:var(--arr);border-bottom-color:var(--arr)}
.dp-body{flex:1;overflow-y:auto;padding:18px}
.dp-pane{display:none}.dp-pane.on{display:block}

/* Description */
.prob-heading{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.prob-heading h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff}
.prob-text{font-size:.86rem;line-height:1.7;color:var(--text);margin-bottom:14px}
.sec-hd{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut);margin-bottom:6px}
.ex-block{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:11px 13px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.65}
.ex-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:5px}
.ex-line{margin-bottom:2px}
.ex-line .ek{color:var(--dim)}
.ex-line .ev{color:#c5e0ff}
.ex-line .en{color:var(--mut);font-size:.72rem}
.constraints{margin-bottom:14px}
.constraints li{list-style:none;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--dim);padding:3px 0;border-bottom:1px solid var(--b1)}
.constraints li::before{content:'&#8250; ';color:var(--mut)}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.tag{padding:2px 8px;border-radius:8px;font-size:.7rem;background:var(--s3);color:var(--dim);border:1px solid var(--b1)}

/* Approach */
.ap-card{background:var(--s2);border:1px solid var(--b1);border-radius:9px;overflow:hidden;margin-bottom:12px}
.ap-head{padding:10px 14px;background:var(--s3);border-bottom:1px solid var(--b1)}
.ap-title{font-weight:600;font-size:.86rem;color:#fff}
.ap-body{padding:12px 14px;font-size:.83rem;line-height:1.68;color:var(--text)}
.cx-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:10px}
.cx-table th{text-align:left;padding:5px 10px;background:var(--s3);color:var(--dim);font-size:.68rem;text-transform:uppercase;letter-spacing:.8px}
.cx-table td{padding:6px 10px;border-bottom:1px solid var(--b1)}
.cx-table tr:last-child td{border-bottom:none}
.cx-t{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--tcol)}
.cx-s{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--scol)}

/* Hints */
.hint-item{background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--warn);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:8px;font-size:.83rem;line-height:1.55;color:var(--text)}
.hint-locked{background:var(--s2);border:1px dashed var(--b1);border-radius:8px;padding:10px 14px;margin-bottom:8px;color:var(--mut);font-size:.8rem;text-align:center;cursor:pointer;transition:.15s}
.hint-locked:hover{border-color:var(--b2);color:var(--dim)}
.hint-all-btn{width:100%;margin-top:6px;padding:7px 14px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--dim);font-size:.78rem;font-weight:500;transition:.15s}
.hint-all-btn:hover{background:var(--s3);color:var(--text)}

/* Solution */
.sol-locked{display:flex;flex-direction:column;align-items:center;padding:28px 16px;text-align:center;gap:10px}
.sol-lock-icon{font-size:2.4rem}
.sol-lock-txt{font-size:.84rem;color:var(--dim);max-width:260px;line-height:1.6}
.sol-reveal-btn{padding:8px 20px;border-radius:8px;border:1px solid rgba(74,158,255,.35);background:rgba(74,158,255,.08);color:var(--arr);font-size:.84rem;font-weight:600;cursor:pointer;transition:.15s}
.sol-reveal-btn:hover{background:rgba(74,158,255,.16)}
.sol-block{margin-bottom:14px}
.sol-hd{padding:7px 12px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:1px solid;display:flex;align-items:center;gap:8px;border-radius:7px 7px 0 0}
.sol-brute-hd{background:rgba(255,179,71,.08);color:var(--brute);border-color:rgba(255,179,71,.2)}
.sol-opt-hd{background:rgba(45,212,191,.08);color:var(--opt);border-color:rgba(45,212,191,.2)}
.sol-pre{background:#040810;padding:13px;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.62;color:#c5dfff;overflow-x:auto;max-height:280px;overflow-y:auto;white-space:pre;border:1px solid var(--b1);border-top:none;border-radius:0 0 7px 7px}

/* ── EDITOR PANEL ── */
.editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ep-bar{padding:7px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--s1)}
.ep-lang{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--dim);background:var(--s2);border:1px solid var(--b1);padding:2px 8px;border-radius:4px}
.ep-shortcut{font-size:.7rem;color:var(--mut)}
.ep-sp{flex:1}
.ep-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;border:1px solid var(--b1);font-size:.79rem;font-weight:600;transition:.15s}
.ep-reset{background:var(--s2);color:var(--dim)}.ep-reset:hover{background:var(--s3);color:var(--text)}
.ep-run{background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.3);color:var(--arr)}.ep-run:hover{background:rgba(74,158,255,.18)}
.ep-sub{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--ok)}.ep-sub:hover{background:rgba(34,197,94,.18)}
.ep-btn:active{transform:scale(.97)}
.editor-wrap{flex:1;overflow:hidden;position:relative}
.CodeMirror{height:100%!important;font-family:'JetBrains Mono',monospace!important;font-size:13px!important;line-height:1.65!important}
.CodeMirror-scroll{padding-bottom:0!important}
.CodeMirror-gutters{background:#04080f!important;border-right:1px solid #1a2d45!important}
.CodeMirror-linenumber{color:#2d4560!important}

/* Results */
.results-area{height:210px;border-top:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;background:var(--s1)}
.ra-hdr{padding:6px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ra-lbl{font-size:.75rem;font-weight:600;color:var(--dim)}
.ra-status{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:10px}
.rs-idle{color:var(--mut)}
.rs-pass{background:rgba(34,197,94,.12);color:var(--ok)}
.rs-fail{background:rgba(239,68,68,.12);color:var(--err)}
.rs-err{background:rgba(245,158,11,.12);color:var(--warn)}
.rs-run{background:rgba(74,158,255,.12);color:var(--arr)}
.ra-body{flex:1;overflow-y:auto;padding:8px 14px}
.tc-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);font-size:.79rem}
.tc-row:last-child{border-bottom:none}
.tc-ico{font-size:.88rem;flex-shrink:0;padding-top:1px}
.tc-info{flex:1;min-width:0}
.tc-name{font-weight:500;color:var(--text);margin-bottom:2px}
.tc-detail{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--dim);line-height:1.5}
.tc-detail .v{color:#8ab4d4}
.tc-detail .e{color:var(--err)}
.console-out{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#6a9fcc;margin-top:4px;padding:4px 8px;background:rgba(74,158,255,.04);border-radius:4px;border-left:2px solid var(--b1)}
.idle-msg{color:var(--mut);font-size:.8rem;padding:6px 0}

/* Resizer */
.resizer{width:4px;background:var(--b1);cursor:col-resize;flex-shrink:0;transition:background .15s}
.resizer:hover,.resizer.drag{background:var(--b3)}

/* Back btn */
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--dim);font-size:.8rem;font-weight:500;transition:.15s}
.back-btn:hover{background:var(--s2);color:var(--text)}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;animation:faIn .25s ease}
.modal-box{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:30px 36px;text-align:center;max-width:340px;width:90%;animation:slideUp .25s ease}
.modal-emoji{font-size:2.8rem;margin-bottom:10px}
.modal-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:6px}
.modal-sub{font-size:.84rem;color:var(--dim);margin-bottom:16px;line-height:1.6}
.modal-cx{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 16px}
.modal-cx-item{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:8px 10px;font-size:.78rem}
.modal-cx-item span:first-child{display:block;color:var(--dim);font-size:.68rem;margin-bottom:3px}
.modal-cx-t{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--tcol)}
.modal-cx-s{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--scol)}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--b1);background:var(--s2);color:var(--text);font-size:.84rem;font-weight:600;cursor:pointer;transition:.15s}
.modal-btn:hover{background:var(--s3)}
.modal-btn-ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:var(--ok)}
.modal-btn-ok:hover{background:rgba(34,197,94,.22)}
@keyframes faIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
@media(max-width:860px){
  #v-solve{flex-direction:column}
  .desc-panel{width:100%;height:44%;border-right:none;border-bottom:1px solid var(--b1);min-width:unset}
  .resizer{display:none}
}
</style>
</head>
<body>
<header id="hdr">
  <div class="logo" id="logo-home"><div class="logo-mark">&#9889;</div>DSA Forge</div>
  <div class="hdr-sep"></div>
  <div class="hdr-crumb" id="crumb"></div>
  <div class="hdr-right">
    <div class="prog-pill">
      <span style="color:var(--dim)">Progress</span>
      <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
      <span class="prog-num" id="pnum">0/23</span>
    </div>
  </div>
</header>

<div id="v-dash" class="view active"></div>

<div id="v-problems" class="view">
  <div class="pl-hdr" id="pl-hdr"></div>
  <div class="pl-wrap">
    <table class="pl-table">
      <thead><tr><th class="td-s"></th><th class="td-n">#</th><th>Title</th><th>Pattern</th><th>Difficulty</th></tr></thead>
      <tbody id="pl-tbody"></tbody>
    </table>
  </div>
</div>

<div id="v-solve" class="view">
  <div class="desc-panel" id="desc-panel">
    <div class="dp-topbar">
      <button class="back-btn" id="back-btn">&#8592; Problems</button>
      <span class="dp-num" id="dp-num"></span>
      <span class="dp-title" id="dp-title-txt"></span>
      <div class="nav-btns">
        <button class="nav-btn" id="nav-prev">&#9664;</button>
        <button class="nav-btn" id="nav-next">&#9654;</button>
      </div>
    </div>
    <div class="dp-tabs-row" id="dp-tabs-row">
      <button class="dp-tab on" data-pane="desc">Description</button>
      <button class="dp-tab" data-pane="approach">Approach</button>
      <button class="dp-tab" data-pane="hints">Hints</button>
      <button class="dp-tab" data-pane="solution">Solution</button>
    </div>
    <div class="dp-body" id="dp-body"></div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="editor-panel">
    <div class="ep-bar">

const PROBLEMS=[
{id:1,cat:'array',tech:'Two Pointer',techId:'tp',title:'Two Sum II',diff:'Easy',
desc:'Given a <strong>1-indexed sorted array</strong>, find two numbers summing to target. Return their 1-based indices <code>[i,j]</code> where i&lt;j.',
examples:[{input:'nums=[2,7,11,15], target=9',output:'[1,2]',note:'2+7=9'},{input:'nums=[2,3,4], target=6',output:'[1,3]',note:'2+4=6'}],
constraints:['2 &le; nums.length &le; 3&times;10&#8308;','Exactly one valid solution','Array is sorted non-decreasingly'],
tags:['Array','Two Pointer','Sorted'],
hints:['The array is sorted — what does that tell us about sums at opposite ends?','If the sum is too small, increase the left pointer. If too large, decrease the right pointer.','Loop while left &lt; right. When sum matches, return [left+1, right+1] (1-indexed).'],
approach:{title:'Opposite-Ends Two Pointer',body:'Start with left=0 and right=n-1. If nums[left]+nums[right] &lt; target we need a bigger number — advance left. If bigger, retreat right. Sorted order guarantees correctness. O(n) time, O(1) space.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`/**\n * @param {number[]} nums  sorted, 1-indexed answer\n * @param {number} target\n * @return {number[]}  [i, j] 1-based\n */\nfunction solution(nums, target) {\n  // Two pointers from opposite ends\n  \n}`,
sol:`function solution(nums, target) {\n  let left = 0, right = nums.length - 1;\n  while (left < right) {\n    const sum = nums[left] + nums[right];\n    if (sum === target)    return [left + 1, right + 1];\n    else if (sum < target) left++;\n    else                   right--;\n  }\n  return [];\n}`,
bruteSol:`function solution(nums, target) {\n  for (let i = 0; i < nums.length; i++)\n    for (let j = i+1; j < nums.length; j++)\n      if (nums[i]+nums[j]===target) return [i+1,j+1];\n  return [];\n}`,
tests:[{args:[[2,7,11,15],9],expected:[1,2],label:'Basic'},{args:[[2,3,4],6],expected:[1,3],label:'Non-adjacent'},{args:[[-1,0],-1],expected:[1,2],label:'Negatives'},{args:[[1,2,3,4,4,9,56,90],8],expected:[4,5],label:'Duplicates'},{args:[[5,25,75],100],expected:[2,3],label:'Last two'}],
compare:'exact'},

{id:2,cat:'array',tech:'Two Pointer',techId:'tp',title:'Remove Duplicates from Sorted Array',diff:'Easy',
desc:'Remove duplicates <strong>in-place</strong> from a sorted array. Each unique element should appear once. Return the count of unique elements.',
examples:[{input:'nums=[1,1,2]',output:'2',note:'Unique elements: [1,2]'},{input:'nums=[0,0,1,1,1,2,2,3,3,4]',output:'5'}],
constraints:['1 &le; nums.length &le; 3&times;10&#8308;','Array is sorted','Each unique element once'],
tags:['Array','Two Pointer','In-place'],
hints:['Use a slow pointer for the write position and a fast pointer to read.','When fast pointer finds a new unique value (different from nums[slow]), advance slow and write.','The slow pointer always points to the last written unique element.'],
approach:{title:'Fast/Slow Writer Pointer',body:'slow tracks the last written unique position. fast scans ahead. When nums[fast] !== nums[slow], we found a new unique value: advance slow and write nums[fast] there. Return slow+1 as the count.',bt:'O(n)',bs:'O(n)',ot:'O(n)',os:'O(1)'},
starter:`/**\n * @param {number[]} nums  sorted, modify in-place\n * @return {number}  count of unique elements\n */\nfunction solution(nums) {\n  // slow = write pointer\n  \n}`,
sol:`function solution(nums) {\n  if (!nums.length) return 0;\n  let slow = 0;\n  for (let fast = 1; fast < nums.length; fast++) {\n    if (nums[fast] !== nums[slow]) {\n      slow++;\n      nums[slow] = nums[fast];\n    }\n  }\n  return slow + 1;\n}`,
bruteSol:`function solution(nums) {\n  const u = [...new Set(nums)];\n  for (let i=0;i<u.length;i++) nums[i]=u[i];\n  return u.length;\n}`,
tests:[{args:[[1,1,2]],expected:2,label:'Simple'},{args:[[0,0,1,1,1,2,2,3,3,4]],expected:5,label:'Multiple'},{args:[[1,2,3]],expected:3,label:'All unique'},{args:[[1,1,1,1]],expected:1,label:'All same'},{args:[[1]],expected:1,label:'Single'}],
compare:'exact'},

{id:3,cat:'array',tech:'Two Pointer',techId:'tp',title:'Sort Colors (Dutch National Flag)',diff:'Medium',
desc:'Sort an array containing only <code>0</code>, <code>1</code>, and <code>2</code> in-place in a <strong>single traversal</strong> without using library sort. Return the sorted array.',
examples:[{input:'nums=[2,0,2,1,1,0]',output:'[0,0,1,1,2,2]'},{input:'nums=[2,0,1]',output:'[0,1,2]'}],
constraints:['1 &le; nums.length &le; 300','Each nums[i] is 0, 1, or 2','One-pass required'],
tags:['Array','Two Pointer','Partition','Dutch Flag'],
hints:['Three regions: zeros at front, twos at back, ones in the middle.','Three pointers: low (next zero slot), mid (current), high (next two slot).','When nums[mid]=0 swap with low (advance both). When 1, just advance mid. When 2, swap with high (only retreat high — new element at mid is unverified).'],
approach:{title:'Dutch National Flag — 3 Pointers',body:'Maintain three sections. low..mid contains ones, everything before low is zeros, after high is twos. Process elements at mid: 0 goes to front (swap low,mid; advance both), 1 stays (advance mid), 2 goes to back (swap mid,high; only retreat high since swapped element is unknown).',bt:'O(n log n)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`/**\n * @param {number[]} nums  values: 0,1,2\n * @return {number[]}  sorted (return for testing)\n */\nfunction solution(nums) {\n  let low = 0, mid = 0, high = nums.length - 1;\n  // Process while mid <= high\n  \n  return nums;\n}`,
sol:`function solution(nums) {\n  let low=0,mid=0,high=nums.length-1;\n  while(mid<=high){\n    if(nums[mid]===0){\n      [nums[low],nums[mid]]=[nums[mid],nums[low]];\n      low++;mid++;\n    } else if(nums[mid]===1){\n      mid++;\n    } else {\n      [nums[mid],nums[high]]=[nums[high],nums[mid]];\n      high--;\n    }\n  }\n  return nums;\n}`,
bruteSol:`function solution(nums){\n  nums.sort((a,b)=>a-b);\n  return nums;\n}`,
tests:[{args:[[2,0,2,1,1,0]],expected:[0,0,1,1,2,2],label:'Classic'},{args:[[2,0,1]],expected:[0,1,2],label:'One each'},{args:[[0]],expected:[0],label:'Single'},{args:[[1,0,1,2,0,2,0,1]],expected:[0,0,0,1,1,1,2,2],label:'Longer'},{args:[[2,2,1,1,0,0]],expected:[0,0,1,1,2,2],label:'Reverse grouped'}],
compare:'exact'},

{id:4,cat:'array',tech:'Sliding Window',techId:'sw',title:'Max Sum Subarray of Size K',diff:'Easy',
desc:'Find the maximum sum of any contiguous subarray of exactly <code>k</code> elements.',
examples:[{input:'nums=[2,1,5,1,3,2], k=3',output:'9',note:'[5,1,3]'},{input:'nums=[2,3,4,1,5], k=2',output:'7',note:'[3,4]'}],
constraints:['1 &le; k &le; nums.length &le; 10&#8309;','&minus;10&#8308; &le; nums[i] &le; 10&#8308;'],
tags:['Array','Sliding Window','Fixed Window'],
hints:['Compute the first k elements as the initial window sum.','Slide right: add nums[i] (entering), subtract nums[i-k] (leaving).','Track the max across all window positions.'],
approach:{title:'Fixed-Size Sliding Window',body:'Build initial window sum over first k elements. Then slide: add the new rightmost element, subtract the leftmost that just exited. O(1) per slide instead of O(k) recomputation.',bt:'O(n&middot;k)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`/**\n * @param {number[]} nums\n * @param {number} k\n * @return {number}\n */\nfunction solution(nums, k) {\n  // Build initial window, then slide\n  \n}`,
sol:`function solution(nums,k){\n  let sum=0;\n  for(let i=0;i<k;i++) sum+=nums[i];\n  let max=sum;\n  for(let i=k;i<nums.length;i++){\n    sum+=nums[i]-nums[i-k];\n    max=Math.max(max,sum);\n  }\n  return max;\n}`,
bruteSol:`function solution(nums,k){\n  let max=-Infinity;\n  for(let i=0;i<=nums.length-k;i++){\n    let s=0;\n    for(let j=i;j<i+k;j++) s+=nums[j];\n    max=Math.max(max,s);\n  }\n  return max;\n}`,
tests:[{args:[[2,1,5,1,3,2],3],expected:9,label:'Middle window'},{args:[[2,3,4,1,5],2],expected:7,label:'Adjacent pair'},{args:[[-1,-2,-3,-4],2],expected:-3,label:'Negatives'},{args:[[1,1,1,1],3],expected:3,label:'All same'},{args:[[7,2,3,1,8,4],4],expected:16,label:'End window'}],
compare:'exact'},

{id:5,cat:'array',tech:'Sliding Window',techId:'sw',title:'Minimum Size Subarray Sum',diff:'Medium',
desc:'Find the minimal length of a contiguous subarray whose sum &ge; <code>target</code>. Return 0 if none exists.',
examples:[{input:'target=7, nums=[2,3,1,2,4,3]',output:'2',note:'[4,3]'},{input:'target=4, nums=[1,4,4]',output:'1',note:'[4]'}],
constraints:['1 &le; target &le; 10&#8313;','1 &le; nums.length &le; 10&#8309;','1 &le; nums[i] &le; 10&#8308; (all positive)'],
tags:['Array','Sliding Window','Variable Window'],
hints:['Expand right pointer, accumulating the running sum.','When sum &ge; target, record window length and shrink from the left.','Each element enters and leaves the window at most once, giving O(n).'],
approach:{title:'Variable Window — Expand &amp; Shrink',body:'Expand right, adding to sum. When sum &ge; target, the window is valid: update minLen, then shrink from left (subtract nums[left++]) and repeat. Because all elements are positive, shrinking always decreases the sum.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`/**\n * @param {number} target\n * @param {number[]} nums\n * @return {number}\n */\nfunction solution(target, nums) {\n  let left = 0, sum = 0, minLen = Infinity;\n  // Expand right, shrink left\n  \n}`,
sol:`function solution(target,nums){\n  let left=0,sum=0,min=Infinity;\n  for(let right=0;right<nums.length;right++){\n    sum+=nums[right];\n    while(sum>=target){\n      min=Math.min(min,right-left+1);\n      sum-=nums[left++];\n    }\n  }\n  return min===Infinity?0:min;\n}`,
bruteSol:`function solution(target,nums){\n  let min=Infinity;\n  for(let i=0;i<nums.length;i++){\n    let s=0;\n    for(let j=i;j<nums.length;j++){\n      s+=nums[j];\n      if(s>=target){min=Math.min(min,j-i+1);break;}\n    }\n  }\n  return min===Infinity?0:min;\n}`,
tests:[{args:[7,[2,3,1,2,4,3]],expected:2,label:'Classic'},{args:[4,[1,4,4]],expected:1,label:'Single'},{args:[11,[1,1,1,1,1,1,1,1]],expected:0,label:'Impossible'},{args:[15,[1,2,3,4,5]],expected:5,label:'Whole array'},{args:[6,[2,2,2,2]],expected:3,label:'Three elements'}],
compare:'exact'},

{id:6,cat:'array',tech:'Sliding Window',techId:'sw',title:'Sliding Window Maximum',diff:'Hard',
desc:'Given array and window size <code>k</code>, return the maximum of each sliding window as it moves left to right.',
examples:[{input:'nums=[1,3,-1,-3,5,3,6,7], k=3',output:'[3,3,5,5,6,7]'},{input:'nums=[1], k=1',output:'[1]'}],
constraints:['1 &le; nums.length &le; 10&#8309;','&minus;10&#8308; &le; nums[i] &le; 10&#8308;','1 &le; k &le; nums.length'],
tags:['Array','Sliding Window','Monotonic Deque','Hard'],
hints:['A naive approach recalculates the max for each window in O(k). Can we do O(1) per window?','A monotonic decreasing deque stores candidate indices. The front is always the current max.','When adding index i: pop all back indices with smaller values (they can never be max while nums[i] is in window). Pop front if it fell outside the window.'],
approach:{title:'Monotonic Decreasing Deque',body:'Maintain a deque of indices in decreasing value order. The front = current window max. Before adding index i: remove back indices whose values are &le; nums[i] (they are dominated). Remove front if it is &lt; i-k+1 (out of window). Push i. When i &ge; k-1, push deque front value to result.',bt:'O(n&middot;k)',bs:'O(k)',ot:'O(n)',os:'O(k)'},
starter:`/**\n * @param {number[]} nums\n * @param {number} k\n * @return {number[]}\n */\nfunction solution(nums, k) {\n  const deque = [], result = [];\n  for (let i = 0; i < nums.length; i++) {\n    // 1. Remove out-of-window front\n    // 2. Remove smaller back elements\n    // 3. Push i\n    // 4. If i >= k-1, push result\n  }\n  return result;\n}`,
sol:`function solution(nums,k){\n  const deque=[],res=[];\n  for(let i=0;i<nums.length;i++){\n    while(deque.length&&deque[0]<i-k+1) deque.shift();\n    while(deque.length&&nums[deque[deque.length-1]]<nums[i]) deque.pop();\n    deque.push(i);\n    if(i>=k-1) res.push(nums[deque[0]]);\n  }\n  return res;\n}`,
bruteSol:`function solution(nums,k){\n  const res=[];\n  for(let i=0;i<=nums.length-k;i++)\n    res.push(Math.max(...nums.slice(i,i+k)));\n  return res;\n}`,
tests:[{args:[[1,3,-1,-3,5,3,6,7],3],expected:[3,3,5,5,6,7],label:'Classic'},{args:[[1],1],expected:[1],label:'Single'},{args:[[9,11],2],expected:[11],label:'Ascending pair'},{args:[[2,1,5,0,3,1],3],expected:[5,5,5,3],label:'Valley'},{args:[[-1,-3,-5,-2,-4],2],expected:[-1,-3,-2,-2],label:'All negative'}],
compare:'exact'},

{id:7,cat:'array',tech:'Prefix Based',techId:'pb',title:'Range Sum Query',diff:'Easy',
desc:'<code>solution(nums, left, right)</code> returns the sum of elements from index <code>left</code> to <code>right</code> inclusive. Build a prefix sum to answer each query in O(1).',
examples:[{input:'nums=[1,2,3,4,5], left=1, right=3',output:'9',note:'2+3+4'},{input:'nums=[1,2,3,4,5], left=0, right=4',output:'15'}],
constraints:['1 &le; nums.length &le; 10&#8308;','&minus;10&#8309; &le; nums[i] &le; 10&#8309;','0 &le; left &le; right &lt; nums.length'],
tags:['Array','Prefix Sum'],
hints:['prefix[i] = sum of nums[0..i-1]. Build this once in O(n).','sum(left, right) = prefix[right+1] - prefix[left].','Seed prefix[0] = 0 as a base case.'],
approach:{title:'Prefix Sum Array',body:'Build prefix where prefix[i] = sum of first i elements. Then sum(l,r) = prefix[r+1] - prefix[l]. This is the classic inclusion-exclusion trick. O(n) build, O(1) per query.',bt:'O(n) per query',bs:'O(1)',ot:'O(1) query',os:'O(n)'},
starter:`function solution(nums, left, right) {\n  const prefix = [0];\n  // Build prefix, return prefix[right+1] - prefix[left]\n  \n}`,
sol:`function solution(nums,left,right){\n  const p=[0];\n  for(const n of nums) p.push(p[p.length-1]+n);\n  return p[right+1]-p[left];\n}`,
bruteSol:`function solution(nums,left,right){\n  let s=0;\n  for(let i=left;i<=right;i++) s+=nums[i];\n  return s;\n}`,
tests:[{args:[[1,2,3,4,5],1,3],expected:9,label:'Middle'},{args:[[1,2,3,4,5],0,4],expected:15,label:'Full'},{args:[[1,2,3,4,5],2,2],expected:3,label:'Single'},{args:[[-1,2,-3,4,-5],0,4],expected:-3,label:'Mixed'},{args:[[10,20,30,40],1,2],expected:50,label:'Two elements'}],
compare:'exact'},

{id:8,cat:'array',tech:'Prefix Based',techId:'pb',title:'Count Subarrays with XOR = K',diff:'Medium',
desc:'Return the count of contiguous subarrays whose XOR of all elements equals <code>k</code>.',
examples:[{input:'nums=[4,2,2,6,4], k=6',output:'4'},{input:'nums=[5,6,7,8,9], k=5',output:'2'}],
constraints:['1 &le; nums.length &le; 10&#8309;','0 &le; nums[i],k &le; 10&#8309;'],
tags:['Array','Prefix XOR','HashMap','Bit Manipulation'],
hints:['XOR(i..j) = prefXOR[j] XOR prefXOR[i-1]. We want this = k.','So we need prefXOR[i-1] = prefXOR[j] XOR k. Count previous prefix XORs equal to this.','Use a HashMap seeded with {0:1}. At each step: count += map.get(xor ^ k).'],
approach:{title:'Prefix XOR + HashMap',body:'Identical pattern to "subarray sum = k" but with XOR. For each position, check how many past prefix XORs equal (currentXOR ^ k). If so, XOR of that subarray is k. Seed map with {0:1} to handle subarrays starting at index 0.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(n)'},
starter:`function solution(nums, k) {\n  const map = new Map([[0, 1]]);\n  let xor = 0, count = 0;\n  // For each n: xor ^= n; count += map.get(xor^k); update map\n  \n}`,
sol:`function solution(nums,k){\n  const map=new Map([[0,1]]);\n  let xor=0,count=0;\n  for(const n of nums){\n    xor^=n;\n    count+=(map.get(xor^k)||0);\n    map.set(xor,(map.get(xor)||0)+1);\n  }\n  return count;\n}`,
bruteSol:`function solution(nums,k){\n  let count=0;\n  for(let i=0;i<nums.length;i++){\n    let x=0;\n    for(let j=i;j<nums.length;j++){\n      x^=nums[j];\n      if(x===k) count++;\n    }\n  }\n  return count;\n}`,
tests:[{args:[[4,2,2,6,4],6],expected:4,label:'Classic'},{args:[[5,6,7,8,9],5],expected:2,label:'Different'},{args:[[1,1,1],0],expected:3,label:'XOR=0 pairs'},{args:[[3],3],expected:1,label:'Single'},{args:[[1,2,3],1],expected:2,label:'Multiple'}],
compare:'exact'},

{id:9,cat:'array',tech:'Prefix Based',techId:'pb',title:'2D Range Sum Query',diff:'Medium',
desc:'<code>solution(matrix, r1, c1, r2, c2)</code> returns the sum of elements in the rectangle from <code>(r1,c1)</code> to <code>(r2,c2)</code> using a 2D prefix sum built first.',
examples:[{input:'matrix=[[3,0,1,4],[5,6,3,2],[1,2,0,1]], query(1,1,2,2)',output:'11',note:'6+3+2+0=11'},{input:'Same matrix, query(0,0,2,3)',output:'28'}],
constraints:['1 &le; m,n &le; 200','&minus;10&#8308; &le; matrix[i][j] &le; 10&#8308;','Valid row/col bounds guaranteed'],
tags:['Array','2D Prefix Sum','Matrix'],
hints:['dp[r][c] = sum of rectangle from (0,0) to (r-1,c-1).','Build: dp[r][c] = matrix[r-1][c-1] + dp[r-1][c] + dp[r][c-1] - dp[r-1][c-1].','Query: dp[r2+1][c2+1] - dp[r1][c2+1] - dp[r2+1][c1] + dp[r1][c1].'],
approach:{title:'2D Prefix Sum — Inclusion-Exclusion',body:'Extend 1D prefix sum to 2D. dp[r][c] = sum of rectangle (0,0)..(r-1,c-1). Build using inclusion-exclusion (add top and left blocks, subtract double-counted corner). Query uses the same idea in reverse.',bt:'O(m&middot;n) per query',bs:'O(1)',ot:'O(1) query',os:'O(m&middot;n)'},
starter:`function solution(matrix, r1, c1, r2, c2) {\n  const m=matrix.length, n=matrix[0].length;\n  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));\n  // Build dp, then return dp[r2+1][c2+1]-dp[r1][c2+1]-dp[r2+1][c1]+dp[r1][c1]\n  \n}`,
sol:`function solution(matrix,r1,c1,r2,c2){\n  const m=matrix.length,n=matrix[0].length;\n  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));\n  for(let r=1;r<=m;r++)\n    for(let c=1;c<=n;c++)\n      dp[r][c]=matrix[r-1][c-1]+dp[r-1][c]+dp[r][c-1]-dp[r-1][c-1];\n  return dp[r2+1][c2+1]-dp[r1][c2+1]-dp[r2+1][c1]+dp[r1][c1];\n}`,
bruteSol:`function solution(matrix,r1,c1,r2,c2){\n  let s=0;\n  for(let r=r1;r<=r2;r++)\n    for(let c=c1;c<=c2;c++) s+=matrix[r][c];\n  return s;\n}`,
tests:[{args:[[[3,0,1,4],[5,6,3,2],[1,2,0,1]],1,1,2,2],expected:11,label:'Middle'},{args:[[[3,0,1,4],[5,6,3,2],[1,2,0,1]],0,0,2,3],expected:28,label:'Full'},{args:[[[3,0,1,4],[5,6,3,2],[1,2,0,1]],0,0,0,0],expected:3,label:'Single cell'},{args:[[[1,2],[3,4]],0,0,1,1],expected:10,label:'2x2 full'},{args:[[[5]],0,0,0,0],expected:5,label:'1x1'}],
compare:'exact'},

{id:10,cat:'array',tech:"Kadane's / Subarray",techId:'kd',title:"Maximum Subarray — Kadane's",diff:'Medium',
desc:"Find the contiguous subarray (minimum one element) with the largest sum and return it.",
examples:[{input:'nums=[-2,1,-3,4,-1,2,1,-5,4]',output:'6',note:'[4,-1,2,1]'},{input:'nums=[1]',output:'1'}],
constraints:['1 &le; nums.length &le; 10&#8309;','&minus;10&#8308; &le; nums[i] &le; 10&#8308;'],
tags:['Array','Dynamic Programming',"Kadane's"],
hints:['At each index, decide: start a new subarray here, or extend the previous one?','If the running sum is negative, it hurts any future sum — start fresh.','curSum = max(nums[i], curSum + nums[i]). Track best = max(best, curSum).'],
approach:{title:"Kadane's Algorithm",body:'Greedy observation: if the running sum becomes negative, it can only hurt the next element — start fresh. curSum = max(nums[i], curSum + nums[i]) captures this. Update global best at each step. O(n) time, O(1) space.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`function solution(nums) {\n  let cur = nums[0], best = nums[0];\n  // Iterate from index 1\n  \n  return best;\n}`,
sol:`function solution(nums){\n  let cur=nums[0],best=nums[0];\n  for(let i=1;i<nums.length;i++){\n    cur=Math.max(nums[i],cur+nums[i]);\n    best=Math.max(best,cur);\n  }\n  return best;\n}`,
bruteSol:`function solution(nums){\n  let best=-Infinity;\n  for(let i=0;i<nums.length;i++){\n    let s=0;\n    for(let j=i;j<nums.length;j++){\n      s+=nums[j];\n      best=Math.max(best,s);\n    }\n  }\n  return best;\n}`,
tests:[{args:[[-2,1,-3,4,-1,2,1,-5,4]],expected:6,label:'Classic'},{args:[[1]],expected:1,label:'Single'},{args:[[-1]],expected:-1,label:'Negative single'},{args:[[5,4,-1,7,8]],expected:23,label:'One dip'},{args:[[-2,-1]],expected:-1,label:'All negative'}],
compare:'exact'},

{id:11,cat:'array',tech:"Kadane's / Subarray",techId:'kd',title:'Maximum Product Subarray',diff:'Medium',
desc:'Find the contiguous subarray with the largest product and return it. Array may contain negatives and zeros.',
examples:[{input:'nums=[2,3,-2,4]',output:'6',note:'[2,3]'},{input:'nums=[-2,0,-1]',output:'0'}],
constraints:['1 &le; nums.length &le; 2&times;10&#8308;','&minus;10 &le; nums[i] &le; 10'],
tags:['Array','Dynamic Programming','Kadane Variant'],
hints:['A large negative &times; another negative = large positive. You must track both max AND min products.','At each step: maxP = max(nums[i], maxP*nums[i], minP*nums[i]), similarly for minP.','The min can become the max after multiplying by a negative number.'],
approach:{title:'Track Both Max and Min Product',body:'Unlike sum, product of two negatives is positive. So the current minimum (most negative) can become the new maximum after a negative element. Track both maxProd and minProd simultaneously, updating both at each step using all three candidates.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(1)'},
starter:`function solution(nums) {\n  let maxP = nums[0], minP = nums[0], result = nums[0];\n  for (let i = 1; i < nums.length; i++) {\n    // Update maxP, minP with all three candidates\n    \n  }\n  return result;\n}`,
sol:`function solution(nums){\n  let maxP=nums[0],minP=nums[0],res=nums[0];\n  for(let i=1;i<nums.length;i++){\n    const cands=[nums[i],maxP*nums[i],minP*nums[i]];\n    maxP=Math.max(...cands);\n    minP=Math.min(...cands);\n    res=Math.max(res,maxP);\n  }\n  return res;\n}`,
bruteSol:`function solution(nums){\n  let best=-Infinity;\n  for(let i=0;i<nums.length;i++){\n    let p=1;\n    for(let j=i;j<nums.length;j++){\n      p*=nums[j];\n      best=Math.max(best,p);\n    }\n  }\n  return best;\n}`,
tests:[{args:[[2,3,-2,4]],expected:6,label:'Positive max'},{args:[[-2,0,-1]],expected:0,label:'Zero breaks'},{args:[[-2,3,-4]],expected:24,label:'Two negatives'},{args:[[2,-5,-2,-4,3]],expected:24,label:'Complex'},{args:[[-1]],expected:-1,label:'Single neg'}],
compare:'exact'},

{id:12,cat:'array',tech:"Kadane's / Subarray",techId:'kd',title:'Count Subarrays with Sum = K',diff:'Medium',
desc:'Return the total number of contiguous subarrays whose sum equals <code>k</code>.',
examples:[{input:'nums=[1,1,1], k=2',output:'2'},{input:'nums=[1,2,3], k=3',output:'2',note:'[1,2] and [3]'}],
constraints:['1 &le; nums.length &le; 2&times;10&#8308;','&minus;1000 &le; nums[i] &le; 1000','&minus;10&#8311; &le; k &le; 10&#8311;'],
tags:['Array','Prefix Sum','HashMap'],
hints:['Sum(i..j) = prefSum[j] - prefSum[i-1]. We want this = k, so prefSum[i-1] = prefSum[j] - k.','For each j, count past prefix sums equal to (currentSum - k).','Use a HashMap seeded with {0:1}. count += map.get(sum - k).'],
approach:{title:'Prefix Sum + HashMap',body:'For each index j, number of subarrays ending here with sum=k equals number of past prefix sums equal to (currentSum-k). A hashmap gives O(1) lookup. Seed {0:1} for subarrays starting at index 0.',bt:'O(n&sup2;)',bs:'O(1)',ot:'O(n)',os:'O(n)'},
starter:`function solution(nums, k) {\n  const map = new Map([[0, 1]]);\n  let sum = 0, count = 0;\n  for (const n of nums) {\n    sum += n;\n    count += (map.get(sum - k) || 0);\n    map.set(sum, (map.get(sum) || 0) + 1);\n  }\n  return count;\n}`,
sol:`function solution(nums,k){\n  const map=new Map([[0,1]]);\n  let sum=0,count=0;\n  for(const n of nums){\n    sum+=n;\n    count+=(map.get(sum-k)||0);\n    map.set(sum,(map.get(sum)||0)+1);\n  }\n  return count;\n}`,
bruteSol:`function solution(nums,k){\n  let count=0;\n  for(let i=0;i<nums.length;i++){\n    let s=0;\n    for(let j=i;j<nums.length;j++){\n      s+=nums[j];\n      if(s===k) count++;\n    }\n  }\n  return count;\n}`,
tests:[{args:[[1,1,1],2],expected:2,label:'Classic'},{args:[[1,2,3],3],expected:2,label:'Two ways'},{args:[[1],0],expected:0,label:'No match'},{args:[[-1,-1,1],0],expected:1,label:'Negatives cancel'},{args:[[3,4,7,2,-3,1,4,2],7],expected:4,label:'Mixed'}],
compare:'exact'},

{id:13,cat:'array',tech:'Binary Search',techId:'bs',title:'Binary Search (Classic)',diff:'Easy',
desc:'Given a <strong>sorted</strong> array of distinct integers, return the index of <code>target</code> or -1 if not found. Must run in O(log n).',
examples:[{input:'nums=[-1,0,3,5,9,12], target=9',output:'4'},{input:'nums=[-1,0,3,5,9,12], target=2',output:'-1'}],
constraints:['1 &le; nums.length &le; 10&#8308;','All values unique','Array sorted ascending'],
tags:['Array','Binary Search'],
hints:['Check the middle element. If it equals target, return mid.','If nums[mid] &lt; target, the target must be in the right half (left = mid+1).','If nums[mid] &gt; target, the target is in the left half (right = mid-1).'],
approach:{title:'Classic Binary Search',body:'Maintain [left, right] boundaries. Compute mid = left + floor((right-left)/2) (avoids overflow). Compare nums[mid] to target. Each comparison eliminates half the remaining search space, giving O(log n).',bt:'O(n)',bs:'O(1)',ot:'O(log n)',os:'O(1)'},
starter:`function solution(nums, target) {\n  let left = 0, right = nums.length - 1;\n  while (left <= right) {\n    const mid = left + Math.floor((right - left) / 2);\n    // Compare nums[mid] to target\n    \n  }\n  return -1;\n}`,
sol:`function solution(nums,target){\n  let left=0,right=nums.length-1;\n  while(left<=right){\n    const mid=left+Math.floor((right-left)/2);\n    if(nums[mid]===target) return mid;\n    else if(nums[mid]<target) left=mid+1;\n    else right=mid-1;\n  }\n  return -1;\n}`,
bruteSol:`function solution(nums,target){\n  for(let i=0;i<nums.length;i++)\n    if(nums[i]===target) return i;\n  return -1;\n}`,
tests:[{args:[[-1,0,3,5,9,12],9],expected:4,label:'Found'},{args:[[-1,0,3,5,9,12],2],expected:-1,label:'Not found'},{args:[[-1,0,3,5,9,12],-1],expected:0,label:'First element'},{args:[[-1,0,3,5,9,12],12],expected:5,label:'Last element'},{args:[[5],5],expected:0,label:'Single'}],
compare:'exact'},

{id:14,cat:'array',tech:'Binary Search',techId:'bs',title:'Integer Square Root (Search on Answer)',diff:'Easy',
desc:'Return floor(sqrt(x)) without using <code>Math.sqrt()</code>. Use binary search over the answer space.',
examples:[{input:'x=4',output:'2'},{input:'x=8',output:'2',note:'sqrt(8)&approx;2.828, floor=2'}],
constraints:['0 &le; x &le; 2&#179;&#185;&minus;1'],
tags:['Math','Binary Search','Answer Space'],
hints:['You are searching for the answer r such that r&sup2; &le; x &lt; (r+1)&sup2;.','Binary search over [1, x/2]. Check if mid&sup2; &le; x.','When loop ends, right holds the floor sqrt.'],
approach:{title:'Binary Search on Answer Space',body:'Instead of an array, search the range [1, x/2]. At midpoint, compare mid&sup2; to x. If mid&sup2; &lt; x, answer is &ge; mid+1. If &gt; x, answer is &le; mid-1. When left &gt; right, right = floor sqrt.',bt:'O(&radic;x)',bs:'O(1)',ot:'O(log x)',os:'O(1)'},
starter:`function solution(x) {\n  if (x < 2) return x;\n  let left = 1, right = Math.floor(x / 2);\n  while (left <= right) {\n    const mid = left + Math.floor((right - left) / 2);\n    const sq = mid * mid;\n    // Compare sq to x\n    \n  }\n  return right;\n}`,
sol:`function solution(x){\n  if(x<2) return x;\n  let left=1,right=Math.floor(x/2);\n  while(left<=right){\n    const mid=left+Math.floor((right-left)/2);\n    const sq=mid*mid;\n    if(sq===x) return mid;\n    else if(sq<x) left=mid+1;\n    else right=mid-1;\n  }\n  return right;\n}`,
bruteSol:`function solution(x){\n  if(x<2) return x;\n  let i=1;\n  while((i+1)*(i+1)<=x) i++;\n  return i;\n}`,
tests:[{args:[4],expected:2,label:'Perfect square'},{args:[8],expected:2,label:'Non-perfect'},{args:[0],expected:0,label:'Zero'},{args:[1],expected:1,label:'One'},{args:[100],expected:10,label:'Larger perfect'},{args:[2147395600],expected:46340,label:'Large input'}],
compare:'exact'},

{id:15,cat:'string',tech:'Sliding Window',techId:'ssw',title:'Longest Substring Without Repeating Characters',diff:'Medium',
desc:'Find the length of the longest substring with all unique characters.',
examples:[{input:'s="abcabcbb"',output:'3',note:'"abc"'},{input:'s="pwwkew"',output:'3',note:'"wke"'}],
constraints:['0 &le; s.length &le; 5&times;10&#8308;','Printable ASCII characters'],
tags:['String','Sliding Window','HashMap'],
hints:['Use a sliding window with a map tracking the last seen index of each character.','When we see a duplicate at index j with last occurrence at prev, jump left to prev+1.','Window size at each step = right - left + 1. Track max.'],
approach:{title:'Last-Index Map + Sliding Window',body:'Map each character to its most recent index. As right moves, if the character was seen at index prev &ge; left, jump left = prev+1 (skip past the duplicate). Update the map and track max window. Each character is processed once: O(n).',bt:'O(n&sup2;)',bs:'O(n)',ot:'O(n)',os:'O(min(n,charset))'},
starter:`function solution(s) {\n  const map = new Map();\n  let left = 0, best = 0;\n  for (let right = 0; right < s.length; right++) {\n    // If s[right] seen at index >= left, move left past it\n    \n    map.set(s[right], right);\n    best = Math.max(best, right - left + 1);\n  }\n  return best;\n}`,
sol:`function solution(s){\n  const map=new Map();\n  let left=0,best=0;\n  for(let right=0;right<s.length;right++){\n    if(map.has(s[right])&&map.get(s[right])>=left)\n      left=map.get(s[right])+1;\n    map.set(s[right],right);\n    best=Math.max(best,right-left+1);\n  }\n  return best;\n}`,
bruteSol:`function solution(s){\n  let best=0;\n  for(let i=0;i<s.length;i++){\n    const seen=new Set();\n    for(let j=i;j<s.length;j++){\n      if(seen.has(s[j])) break;\n      seen.add(s[j]);\n      best=Math.max(best,j-i+1);\n    }\n  }\n  return best;\n}`,
tests:[{args:['abcabcbb'],expected:3,label:'Classic'},{args:['bbbbb'],expected:1,label:'All same'},{args:['pwwkew'],expected:3,label:'Window middle'},{args:[''],expected:0,label:'Empty'},{args:['abcdefgh'],expected:8,label:'All unique'}],
compare:'exact'},

{id:16,cat:'string',tech:'Sliding Window',techId:'ssw',title:'Minimum Window Substring',diff:'Hard',
desc:'Find the smallest substring of <code>s</code> containing every character of <code>t</code> (including duplicates). Return empty string if impossible.',
examples:[{input:'s="ADOBECODEBANC", t="ABC"',output:'"BANC"'},{input:'s="a", t="a"',output:'"a"'}],
constraints:['1 &le; s.length &le; 10&#8309;','1 &le; t.length &le; 10&#8309;','s and t: uppercase and lowercase English letters'],
tags:['String','Sliding Window','HashMap','Hard'],
hints:['Track how many distinct character requirements are "satisfied" (count met window &ge; need).','Expand right adding characters; when all requirements met, record window and shrink from left.','have === needed means the window is valid. Shrink, record, then break condition by decrementing have.'],
approach:{title:'Two-Pointer + Frequency Maps',body:'need map for t frequencies. Expand right: if window count for that char hits need, increment have. When have===needed, window is valid: record it, then shrink from left (if that char was critical, decrement have). Each char is added/removed once: O(n).',bt:'O(n&sup2;)',bs:'O(n)',ot:'O(n)',os:'O(n)'},
starter:`function solution(s, t) {\n  const need={}, win={};\n  for(const c of t) need[c]=(need[c]||0)+1;\n  let have=0, needed=Object.keys(need).length;\n  let left=0, result='';\n  for(let right=0;right<s.length;right++){\n    // Add s[right] to win, update have\n    // While have===needed: update result, shrink left\n  }\n  return result;\n}`,
sol:`function solution(s,t){\n  const need={},win={};\n  for(const c of t) need[c]=(need[c]||0)+1;\n  let have=0,needed=Object.keys(need).length,left=0,result='';\n  for(let right=0;right<s.length;right++){\n    const c=s[right];\n    win[c]=(win[c]||0)+1;\n    if(need[c]&&win[c]===need[c]) have++;\n    while(have===needed){\n      const sub=s.slice(left,right+1);\n      if(!result||sub.length<result.length) result=sub;\n      win[s[left]]--;\n      if(need[s[left]]&&win[s[left]]<need[s[left]]) have--;\n      left++;\n    }\n  }\n  return result;\n}`,
bruteSol:`function solution(s,t){\n  const need={};\n  for(const c of t) need[c]=(need[c]||0)+1;\n  let result='';\n  for(let i=0;i<s.length;i++){\n    const have={...need};let rem=Object.keys(need).length;\n    for(let j=i;j<s.length;j++){\n      if(have[s[j]]!==undefined){if(--have[s[j]]===0)rem--;}\n      if(rem===0){const sub=s.slice(i,j+1);if(!result||sub.length<result.length)result=sub;break;}\n    }\n  }\n  return result;\n}`,
tests:[{args:['ADOBECODEBANC','ABC'],expected:'BANC',label:'Classic'},{args:['a','a'],expected:'a',label:'Single'},{args:['a','b'],expected:'',label:'Impossible'},{args:['aa','aa'],expected:'aa',label:'Dup in t'},{args:['ABCBA','AB'],expected:'AB',label:'Start of string'}],
compare:'exact'},

{id:17,cat:'string',tech:'Sliding Window',techId:'ssw',title:'Find All Anagrams in String',diff:'Medium',
desc:'Return all start indices in <code>s</code> where a permutation of <code>p</code> begins.',
examples:[{input:'s="cbaebabacd", p="abc"',output:'[0,6]'},{input:'s="abab", p="ab"',output:'[0,1,2]'}],
constraints:['1 &le; s.length,p.length &le; 3&times;10&#8308;','Lowercase English letters'],
tags:['String','Sliding Window','Fixed Window','Frequency Array'],
hints:['Build a frequency array of 26 slots for p and a sliding window of the same length.','When the window slides: add new right char, remove exited left char.','If both frequency arrays match (26 comparisons), record the start index.'],
approach:{title:'Fixed Window + 26-slot Frequency Array',body:'Build pCnt for p. Maintain sCnt for the current window (length p.length). When window moves, update sCnt in O(1). Compare pCnt.join() === sCnt.join() in O(26) = O(1). Total: O(n).',bt:'O(n&middot;k log k)',bs:'O(k)',ot:'O(n)',os:'O(1)'},
starter:`function solution(s, p) {\n  if(s.length<p.length) return [];\n  const a='a'.charCodeAt(0);\n  const pCnt=new Array(26).fill(0), sCnt=new Array(26).fill(0);\n  const result=[];\n  // Build initial window, then slide\n  \n  return result;\n}`,
sol:`function solution(s,p){\n  if(s.length<p.length) return [];\n  const a='a'.charCodeAt(0);\n  const pCnt=new Array(26).fill(0),sCnt=new Array(26).fill(0),res=[];\n  for(let i=0;i<p.length;i++){pCnt[p.charCodeAt(i)-a]++;sCnt[s.charCodeAt(i)-a]++;}\n  if(pCnt.join()===sCnt.join()) res.push(0);\n  for(let i=p.length;i<s.length;i++){\n    sCnt[s.charCodeAt(i)-a]++;\n    sCnt[s.charCodeAt(i-p.length)-a]--;\n    if(pCnt.join()===sCnt.join()) res.push(i-p.length+1);\n  }\n  return res;\n}`,
bruteSol:`function solution(s,p){\n  const res=[],t=p.split('').sort().join('');\n  for(let i=0;i<=s.length-p.length;i++)\n    if(s.slice(i,i+p.length).split('').sort().join('')===t) res.push(i);\n  return res;\n}`,
tests:[{args:['cbaebabacd','abc'],expected:[0,6],label:'Two anagrams'},{args:['abab','ab'],expected:[0,1,2],label:'Overlapping'},{args:['aa','bb'],expected:[],label:'No match'},{args:['baa','aa'],expected:[1],label:'One match'}],
compare:'sorted'},

{id:18,cat:'string',tech:'Two Pointers',techId:'stp',title:'Valid Palindrome',diff:'Easy',
desc:'Return <code>true</code> if <code>s</code> is a palindrome after removing all non-alphanumeric characters and converting to lowercase.',
examples:[{input:'s="A man, a plan, a canal: Panama"',output:'true'},{input:'s="race a car"',output:'false'}],
constraints:['1 &le; s.length &le; 2&times;10&#8309;','Printable ASCII'],
tags:['String','Two Pointer'],
hints:['Use two pointers from both ends.','Skip any character that is not alphanumeric.','Compare the characters at left and right (case-insensitive). If any pair mismatches, return false.'],
approach:{title:'Two Pointers — Skip Non-Alphanumeric',body:'l starts at 0, r at end. While l &lt; r: skip non-alphanum at l, skip at r, compare lowercased chars. If mismatch, false. This avoids creating a cleaned copy (O(1) space beyond input).',bt:'O(n)',bs:'O(n)',ot:'O(n)',os:'O(1)'},
starter:`function solution(s) {\n  const ok = c => /[a-zA-Z0-9]/.test(c);\n  let l = 0, r = s.length - 1;\n  while (l < r) {\n    while (l < r && !ok(s[l])) l++;\n    while (l < r && !ok(s[r])) r--;\n    if (s[l].toLowerCase() !== s[r].toLowerCase()) return false;\n    l++; r--;\n  }\n  return true;\n}`,
sol:`function solution(s){\n  const ok=c=>/[a-zA-Z0-9]/.test(c);\n  let l=0,r=s.length-1;\n  while(l<r){\n    while(l<r&&!ok(s[l]))l++;\n    while(l<r&&!ok(s[r]))r--;\n    if(s[l].toLowerCase()!==s[r].toLowerCase()) return false;\n    l++;r--;\n  }\n  return true;\n}`,
bruteSol:`function solution(s){\n  const c=s.toLowerCase().replace(/[^a-z0-9]/g,'');\n  return c===c.split('').reverse().join('');\n}`,
tests:[{args:['A man, a plan, a canal: Panama'],expected:true,label:'Classic'},{args:['race a car'],expected:false,label:'False case'},{args:[' '],expected:true,label:'Single space'},{args:['Was it a car or a cat I saw?'],expected:true,label:'Question'},{args:['0P'],expected:false,label:'Short false'}],
compare:'exact'},

{id:19,cat:'string',tech:'Two Pointers',techId:'stp',title:'Reverse Words in a String',diff:'Medium',
desc:'Reverse the order of words in <code>s</code>. Remove leading/trailing spaces and reduce multiple spaces to one.',
examples:[{input:'s="the sky is blue"',output:'"blue is sky the"'},{input:'s="  hello world  "',output:'"world hello"'}],
constraints:['1 &le; s.length &le; 10&#8308;','May have extra spaces between/around words'],
tags:['String','Two Pointer'],
hints:['Trim the string, split by one-or-more spaces, reverse the resulting array, join with single space.','OR: reverse entire string, then reverse each individual word in place.','The two-reverse trick is the in-place O(1) extra space solution.'],
approach:{title:'Trim + Split + Reverse + Join',body:'Simple approach: trim whitespace, split on /\\s+/ (matches multiple spaces), reverse the array, join with single space. Alternatively, the classic in-place approach reverses everything then fixes each word.',bt:'O(n)',bs:'O(n)',ot:'O(n)',os:'O(n)'},
starter:`function solution(s) {\n  return s.trim().split(/\\s+/).reverse().join(' ');\n}`,
sol:`function solution(s){\n  return s.trim().split(/\\s+/).reverse().join(' ');\n}`,
bruteSol:`function solution(s){\n  const words=[];\n  let w='';\n  for(const c of s+' '){\n    if(c===' '){if(w){words.push(w);w='';}}\n    else w+=c;\n  }\n  return words.reverse().join(' ');\n}`,
tests:[{args:['the sky is blue'],expected:'blue is sky the',label:'Classic'},{args:['  hello world  '],expected:'world hello',label:'Extra spaces'},{args:['a good   example'],expected:'example good a',label:'Multiple spaces'},{args:['  Bob    Loves  Alice   '],expected:'Alice Loves Bob',label:'All extra'},{args:['Alice does not even like bob'],expected:'bob like even not does Alice',label:'Long'}],
compare:'exact'},

{id:20,cat:'string',tech:'Two Pointers',techId:'stp',title:'String Compression',diff:'Medium',
desc:'Compress <code>chars</code> array in-place using run-length encoding. Consecutive chars become char+count (e.g. aaa becomes [a,3]). Return the new length.',
examples:[{input:"chars=['a','a','b','b','c','c','c']",output:'6',note:"['a','2','b','2','c','3']"},{input:"chars=['a']",output:'1'}],
constraints:['1 &le; chars.length &le; 2000','chars[i] is lowercase letter, digit, or symbol'],
tags:['String','Two Pointer','In-place'],
hints:['Use a read pointer i (scans groups) and a write pointer.','For each group: write the character, then write each digit of the count if count &gt; 1.','The write pointer is always &le; read pointer, so we never overwrite unread data.'],
approach:{title:'Read/Write Pointer Compression',body:'Scan groups of same characters. For each group: write char at write pointer, then write each digit of count (if &gt;1). Write pointer never overtakes read pointer (run length encoding always compresses or stays same). Return write pointer as new length.',bt:'O(n)',bs:'O(n)',ot:'O(n)',os:'O(1)'},
starter:`function solution(chars) {\n  let write = 0, i = 0;\n  while (i < chars.length) {\n    const c = chars[i]; let count = 0;\n    while (i < chars.length && chars[i] === c) { count++; i++; }\n    chars[write++] = c;\n    if (count > 1) for (const d of String(count)) chars[write++] = d;\n  }\n  return write;\n}`,
sol:`function solution(chars){\n  let write=0,i=0;\n  while(i<chars.length){\n    const c=chars[i];let count=0;\n    while(i<chars.length&&chars[i]===c){count++;i++;}\n    chars[write++]=c;\n    if(count>1) for(const d of String(count)) chars[write++]=d;\n  }\n  return write;\n}`,
bruteSol:`function solution(chars){\n  let res='',i=0;\n  while(i<chars.length){\n    const c=chars[i];let cnt=0;\n    while(i<chars.length&&chars[i]===c){cnt++;i++;}\n    res+=c+(cnt>1?cnt:'');\n  }\n  const arr=res.split('');\n  for(let j=0;j<arr.length;j++) chars[j]=arr[j];\n  return arr.length;\n}`,
tests:[{args:[['a','a','b','b','c','c','c']],expected:6,label:'Classic'},{args:[['a']],expected:1,label:'Single'},{args:[['a','b','c']],expected:3,label:'All unique'},{args:[['a','a','a','a','a','a','a','a','a','a','a','a']],expected:4,label:'Two-digit count'},{args:[['a','a','b']],expected:3,label:'One pair'}],
compare:'exact'},

{id:21,cat:'string',tech:'Pattern Matching',techId:'pm',title:'KMP — Knuth-Morris-Pratt',diff:'Medium',
desc:'Find all start indices in <code>text</code> where <code>pattern</code> occurs. Implement KMP with the LPS (failure function) array to achieve O(n+m).',
examples:[{input:'text="aabcaabxaaab", pattern="aab"',output:'[0,4]'},{input:'text="aabaaa", pattern="aa"',output:'[0,3,4]'}],
constraints:['1 &le; text.length &le; 10&#8309;','1 &le; pattern.length &le; 100'],
tags:['String','Pattern Matching','KMP','LPS Array'],
hints:['Build LPS array: lps[i] = length of longest proper prefix of pattern[0..i] that is also a suffix.','On mismatch at j>0: jump j = lps[j-1] (don\'t restart from 0).','When j === pattern.length: match found at i-j. Set j = lps[j-1] to continue.'],
approach:{title:'KMP with Failure Function (LPS)',body:'Precompute LPS in O(m). During search, i scans text, j scans pattern. On match: advance both. On mismatch with j>0: set j=lps[j-1] (reuse matched prefix). On mismatch with j=0: advance i. This avoids re-checking text characters.',bt:'O(n&middot;m)',bs:'O(1)',ot:'O(n+m)',os:'O(m)'},
starter:`function solution(text, pattern) {\n  // Build LPS array\n  const lps = new Array(pattern.length).fill(0);\n  let len = 0, k = 1;\n  while (k < pattern.length) {\n    if (pattern[k] === pattern[len]) lps[k++] = ++len;\n    else if (len > 0) len = lps[len-1];\n    else lps[k++] = 0;\n  }\n  // KMP Search\n  const result = [];\n  let i = 0, j = 0;\n  while (i < text.length) {\n    if (text[i] === pattern[j]) { i++; j++; }\n    if (j === pattern.length) { result.push(i-j); j = lps[j-1]; }\n    else if (i < text.length && text[i] !== pattern[j]) {\n      if (j > 0) j = lps[j-1]; else i++;\n    }\n  }\n  return result;\n}`,
sol:`function solution(text,pattern){\n  const lps=new Array(pattern.length).fill(0);\n  let len=0,k=1;\n  while(k<pattern.length){\n    if(pattern[k]===pattern[len]) lps[k++]=++len;\n    else if(len>0) len=lps[len-1];\n    else lps[k++]=0;\n  }\n  const res=[];let i=0,j=0;\n  while(i<text.length){\n    if(text[i]===pattern[j]){i++;j++;}\n    if(j===pattern.length){res.push(i-j);j=lps[j-1];}\n    else if(i<text.length&&text[i]!==pattern[j]){\n      if(j>0) j=lps[j-1]; else i++;\n    }\n  }\n  return res;\n}`,
bruteSol:`function solution(text,pattern){\n  const res=[];\n  for(let i=0;i<=text.length-pattern.length;i++){\n    let j=0;\n    while(j<pattern.length&&text[i+j]===pattern[j]) j++;\n    if(j===pattern.length) res.push(i);\n  }\n  return res;\n}`,
tests:[{args:['aabcaabxaaab','aab'],expected:[0,4],label:'Two matches'},{args:['aabaaa','aa'],expected:[0,3,4],label:'Overlapping'},{args:['abcdef','xyz'],expected:[],label:'No match'},{args:['aaaa','aa'],expected:[0,1,2],label:'All overlapping'},{args:['abc','abc'],expected:[0],label:'Exact'}],
compare:'sorted'},

{id:22,cat:'string',tech:'Pattern Matching',techId:'pm',title:'Rabin-Karp — Rolling Hash',diff:'Medium',
desc:'Find all occurrences of <code>pattern</code> in <code>text</code> using rolling polynomial hash. Return sorted start indices.',
examples:[{input:'text="abcabc", pattern="abc"',output:'[0,3]'},{input:'text="aaaa", pattern="aa"',output:'[0,1,2]'}],
constraints:['1 &le; text.length &le; 10&#8309;','1 &le; pattern.length &le; 100'],
tags:['String','Pattern Matching','Rolling Hash','Rabin-Karp'],
hints:['Compute polynomial hash for pattern and first window. BASE=31, MOD=1e9+9.','Slide: hash = (hash - code(leftChar)*pow)*BASE + code(newRightChar).','On hash match, verify with string comparison to guard against collisions.'],
approach:{title:'Rolling Polynomial Hash',body:'Hash = &Sigma; code(c[i])*BASE^(m-1-i) mod MOD. When sliding, remove leftmost char contribution (&times;power), multiply rest by BASE, add new rightmost. O(1) per slide. Verify on hash match to handle collisions. Average O(n+m).',bt:'O(n&middot;m)',bs:'O(1)',ot:'O(n+m) avg',os:'O(1)'},
starter:`/**\n * @param {string} text\n * @param {string} pattern\n * @return {number[]}  all start indices\n */\nfunction solution(text, pattern) {\n  const BASE = 31, MOD = 1e9 + 9;\n  const n = text.length, m = pattern.length, result = [];\n  if (m > n) return result;\n  const code = c => c.charCodeAt(0) - 96;\n  // 1. Compute initial hash for pattern and first window\n  // 2. Slide: remove left char, add right char in O(1)\n  // 3. On hash match, verify with string comparison\n  \n  return result;\n}`,
sol:`function solution(text,pattern){\n  const BASE=31,MOD=1e9+9;\n  const n=text.length,m=pattern.length,res=[];\n  if(m>n) return res;\n  const code=c=>c.charCodeAt(0)-96;\n  let pH=0,wH=0,pow=1;\n  for(let i=0;i<m;i++){\n    pH=(pH*BASE+code(pattern[i]))%MOD;\n    wH=(wH*BASE+code(text[i]))%MOD;\n    if(i>0) pow=(pow*BASE)%MOD;\n  }\n  if(pH===wH&&text.slice(0,m)===pattern) res.push(0);\n  for(let i=1;i<=n-m;i++){\n    wH=((wH-code(text[i-1])*pow%MOD+MOD)*BASE+code(text[i+m-1]))%MOD;\n    if(pH===wH&&text.slice(i,i+m)===pattern) res.push(i);\n  }\n  return res;\n}`,
bruteSol:`function solution(text,pattern){\n  const res=[];\n  for(let i=0;i<=text.length-pattern.length;i++)\n    if(text.slice(i,i+pattern.length)===pattern) res.push(i);\n  return res;\n}`,
tests:[{args:['abcabc','abc'],expected:[0,3],label:'Two matches'},{args:['aaaa','aa'],expected:[0,1,2],label:'Overlapping'},{args:['hello','xyz'],expected:[],label:'No match'},{args:['abcde','abcde'],expected:[0],label:'Full match'},{args:['aababab','abab'],expected:[1,3],label:'Multiple'}],
compare:'sorted'},

{id:23,cat:'string',tech:'Pattern Matching',techId:'pm',title:'Z-Algorithm',diff:'Medium',
desc:'Find all occurrences of <code>pattern</code> in <code>text</code> using the Z-array on the concatenated string. Return sorted start indices.',
examples:[{input:'text="aabcaab", pattern="aab"',output:'[0,4]'},{input:'text="aaaa", pattern="aa"',output:'[0,1,2]'}],
constraints:['1 &le; text.length &le; 10&#8309;','1 &le; pattern.length &le; 100'],
tags:['String','Pattern Matching','Z-Array'],
hints:['Concatenate s = pattern + "$" + text. "$" separates and can\'t appear in matches.','Build Z-array: z[i] = length of longest substring starting at s[i] that is also a prefix of s.','If z[i] === m (pattern.length) for i in the text region, there\'s a match at i - m - 1.'],
approach:{title:'Z-Array on Concatenated String',body:'Z-array built in O(n+m) using a Z-box [l,r]. z[i]: if i is inside the Z-box, use z[i-l] as a starting estimate (prefix already computed). Extend beyond the Z-box linearly. Each char is processed O(1) amortized. Match found when z[i] = m.',bt:'O(n&middot;m)',bs:'O(1)',ot:'O(n+m)',os:'O(n+m)'},
starter:`/**\n * @param {string} text\n * @param {string} pattern\n * @return {number[]}  all start indices\n */\nfunction solution(text, pattern) {\n  const m = pattern.length;\n  // 1. Build s = pattern + '$' + text\n  // 2. Compute Z-array in O(n+m) using [l,r] Z-box\n  // 3. Where z[i] === m (in text region), record match index\n  \n  return [];\n}`,
sol:`function solution(text,pattern){\n  const s=pattern+'$'+text;\n  const n=s.length,z=new Array(n).fill(0);\n  let l=0,r=0;\n  for(let i=1;i<n;i++){\n    if(i<r) z[i]=Math.min(r-i,z[i-l]);\n    while(i+z[i]<n&&s[z[i]]===s[i+z[i]]) z[i]++;\n    if(i+z[i]>r){l=i;r=i+z[i];}\n  }\n  const res=[],m=pattern.length;\n  for(let i=m+1;i<s.length;i++)\n    if(z[i]===m) res.push(i-m-1);\n  return res;\n}`,
bruteSol:`function solution(text,pattern){\n  const res=[];\n  for(let i=0;i<=text.length-pattern.length;i++)\n    if(text.slice(i,i+pattern.length)===pattern) res.push(i);\n  return res;\n}`,
tests:[{args:['aabcaab','aab'],expected:[0,4],label:'Two matches'},{args:['aaaa','aa'],expected:[0,1,2],label:'Overlapping'},{args:['hello','world'],expected:[],label:'No match'},{args:['mississippi','issi'],expected:[1,4],label:'Multiple'},{args:['abcabc','abc'],expected:[0,3],label:'Two halves'}],
compare:'sorted'}
];

    {id:'sw', name:'Sliding Window',     icon:'&#8865;', desc:'Maintain a dynamic subarray window and slide it over the data — fixed or variable size.', col:'var(--arr)'},
    {id:'pb', name:'Prefix Based',       icon:'&Sigma;', desc:'Precompute cumulative sums/XOR to answer range queries in O(1) after O(n) build.', col:'var(--arr)'},
    {id:'kd', name:"Kadane's / Subarray",icon:'&#9651;', desc:'Track running state over subarrays using DP — decide at each step whether to extend or restart.', col:'var(--arr)'},
    {id:'bs', name:'Binary Search',      icon:'&#8918;', desc:'Eliminate half the search space each step — on sorted arrays or monotonic answer spaces.', col:'var(--arr)'},
  ],

    {id:'ssw',name:'Sliding Window',     icon:'&#8865;', desc:'Maintain a window of characters and slide to find optimal substrings with constraints.', col:'var(--str)'},
    {id:'stp',name:'Two Pointers',       icon:'&#8596;', desc:'Two indices converging inward or scanning forward to process string structure efficiently.', col:'var(--str)'},

  ]
