    {id:'gr_jump', name:'Jump Game Pattern',    desc:'Track max reachable position; greedy local choice leads to global optimum.'},
    {id:'gr_int',  name:'Interval Greedy',      desc:'Sort by end time; greedily keep earliest-ending non-overlapping intervals.'},
    {id:'gr_res',  name:'Resource Allocation',  desc:'Meeting rooms / minimum platforms: sweep line or two sorted arrays.'},
  ],
  bits:[
    {id:'bit_xor', name:'XOR Pattern',      desc:'XOR cancels duplicates (a^a=0) to isolate unique elements or differences.'},
    {id:'bit_mask',name:'Bit Masking',      desc:'Check, set, clear individual bits. Count set bits with Brian Kernighan.'},
    {id:'bit_sub', name:'Subset via Bits',  desc:'Enumerate all 2^n subsets using bitmask from 0 to 2^n-1.'},
  ],
  sorting:[
    {id:'sort_cmp',name:'Divide & Conquer Sort', desc:'Merge sort: recursively divide and merge. Guaranteed O(n log n).'},
    {id:'sort_cnt',name:'Distribution Sort',      desc:'Counting / radix sort: O(n+k) by exploiting known value range.'},
  ],
};

/* ── HELPERS ────────────────────────────────────────────────── */
function getAllPats(){return Object.values(PATTERNS).flat();}
function catLabel(cat){return (CAT_META[cat]||{label:cat}).label;}
function catColor(cat){return (CAT_META[cat]||{color:'var(--text)'}).color;}

/* ── STATE ──────────────────────────────────────────────────── */
const S={view:'dash',cat:null,patId:null,prob:null,editor:null,diffFilter:'all'};

/* ── PERSIST ────────────────────────────────────────────────── */
function getSolved(){try{return JSON.parse(localStorage.getItem('dsa_solved')||'[]');}catch{return[];}}
function getAttempted(){try{return JSON.parse(localStorage.getItem('dsa_attempted')||'[]');}catch{return[];}}
function markSolved(id){const s=getSolved();if(!s.includes(id)){s.push(id);localStorage.setItem('dsa_solved',JSON.stringify(s));}}
function markAtt(id){const a=getAttempted();if(!a.includes(id)){a.push(id);localStorage.setItem('dsa_attempted',JSON.stringify(a));}}
function saveCode(id,code){localStorage.setItem('dsa_code_'+id,code);}
function loadCode(id){return localStorage.getItem('dsa_code_'+id)||null;}

/* ── NAVIGATION ─────────────────────────────────────────────── */
function showV(id){['v-dash','v-problems','v-solve'].forEach(v=>{const el=document.getElementById(v);if(el)el.style.display=v===id?'flex':'none';});}

function go_dash(){
  S.view='dash';S.cat=null;S.patId=null;S.prob=null;
  showV('v-dash');renderDash();
  document.getElementById('crumb').innerHTML='<span class="crumb-item active">Dashboard</span>';
}

function go_problems(id){
  // id can be a patternId (techId) or a category key
  let foundCat=null;
  for(const [cat,pats] of Object.entries(PATTERNS)){
    if(pats.find(p=>p.id===id)){foundCat=cat;break;}
  }
  if(foundCat){S.patId=id;S.cat=foundCat;}
  else{S.patId=null;S.cat=id;}
  S.view='problems';
  showV('v-problems');renderProblems();
  const pat=getAllPats().find(p=>p.id===id);
  const label=pat?pat.name:catLabel(S.cat);
  const color=catColor(S.cat);
  setCrumb([
    {label:catLabel(S.cat),fn:()=>go_problems(S.cat)},
    ...(pat?[{label:pat.name,fn:()=>go_problems(id)}]:[])
  ],color);
}

function go_solve(probId){
  S.prob=PROBLEMS.find(p=>p.id===probId);
  if(!S.prob)return;
  S.view='solve';
  showV('v-solve');
  renderSolve();
  const color=catColor(S.prob.cat);
  setCrumb([
    {label:catLabel(S.prob.cat),fn:()=>go_problems(S.prob.cat)},
    ...(S.patId?[{label:(getAllPats().find(p=>p.id===S.patId)||{name:''}).name,fn:()=>go_problems(S.patId)}]:[]),
    {label:S.prob.title,fn:()=>go_solve(probId)}
  ],color);
  initEditor();
}

function setCrumb(parts,color){
  const el=document.getElementById('crumb');
  let html='<span class="crumb-item" style="cursor:pointer" onclick="go_dash()">Dashboard</span>';
  parts.forEach((p,i)=>{
    html+=`<span class="crumb-sep">›</span>`;
    const isLast=i===parts.length-1;
    html+=`<span class="crumb-item${isLast?' active':''}" ${!isLast?`style="cursor:pointer;color:${color||'var(--text)'}" onclick="${p.fn.toString().replace(/"/g,"'")}"`:''}>${p.label}</span>`;
  });
  el.innerHTML=html;
}

/* ── FILTER / HELPERS ───────────────────────────────────────── */
function getFiltered(){
  return PROBLEMS.filter(p=>
    (S.patId?p.techId===S.patId:p.cat===S.cat)&&
    (S.diffFilter==='all'||p.diff===S.diffFilter)

}

function dpTab(name,btn){

function revealNextHint(){
  const p=S.prob;if(!p)return;
  const shown=S._hintsShown||0;
  if(shown<p.hints.length){
    const el=document.getElementById(`hint-${p.id}-${shown}`);
    if(el) el.style.display='block';
    S._hintsShown=shown+1;
    const btn=document.getElementById('hint-btn');
    if(btn){
      if(S._hintsShown<p.hints.length) btn.textContent=`💡 Show Hint ${S._hintsShown+1}`;
      else{btn.textContent='🔓 Reveal Solution';btn.onclick=revealSolution;}
    }
  }
}

function revealSolution(){
  if(S._solRevealed)return;
  S._solRevealed=true;
  const p=S.prob;if(!p)return;
  const area=document.getElementById('sol-area');
  if(!area)return;
  area.innerHTML=`
    ${p.bruteSol?`<div class="sol-block"><div class="sol-hd sol-brute-hd">&#128049; Brute Force</div><pre class="sol-pre">${escHtml(p.bruteSol)}</pre></div>`:''}
    <div class="sol-block"><div class="sol-hd sol-opt-hd">&#10024; Optimal Solution</div><pre class="sol-pre">${escHtml(p.sol)}</pre></div>`;

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}



/* ── EDITOR ──────────────────────────────────────────────────── */
function initEditor(){
  const wrap=document.getElementById('editor-wrap');
  if(!wrap)return;
  wrap.innerHTML='';
  const p=S.prob;if(!p)return;
  const saved=loadCode(p.id);
  if(S.editor){try{S.editor.toTextArea();}catch(e){}}
  const ta=document.createElement('textarea');
  wrap.appendChild(ta);
  S.editor=CodeMirror.fromTextArea(ta,{
    value:saved||p.starter,
    mode:'javascript',
    theme:'dracula',
    lineNumbers:true,
    tabSize:2,
    indentWithTabs:false,
    autoCloseBrackets:true,
    matchBrackets:true,
    extraKeys:{'Ctrl-Enter':()=>runTests(false),'Cmd-Enter':()=>runTests(false)}
  });
  S.editor.setValue(saved||p.starter);
  S.editor.on('change',()=>saveCode(p.id,S.editor.getValue()));
}

function resetEditor(){
  const p=S.prob;if(!p||!S.editor)return;
  if(confirm('Reset to starter template?')){S.editor.setValue(p.starter);saveCode(p.id,p.starter);}
}

/* ── TEST RUNNER ─────────────────────────────────────────────────── */
function deepEq(a,b,compareType){
  if(compareType==='sorted'){
    return JSON.stringify([...a].sort((x,y)=>x-y))===JSON.stringify([...b].sort((x,y)=>x-y));
  }
  if(compareType==='sorted_nested'){
    const norm=arr=>[...arr].map(x=>[...x].sort((a,b)=>String(a)<String(b)?-1:1).join('|')).sort().join('||');
    return norm(a)===norm(b);
  }
  return JSON.stringify(a)===JSON.stringify(b);
}

function runTests(isSubmit){
  const p=S.prob;if(!p||!S.editor)return;
  const code=S.editor.getValue().trim();if(!code)return;
  markAtt(p.id);
  const statusEl=document.getElementById('ra-status');
  const bodyEl=document.getElementById('ra-body');
  if(!statusEl||!bodyEl)return;
  statusEl.className='ra-status rs-run';
  statusEl.textContent='⏳ running...';
  bodyEl.innerHTML='<div class="idle-msg">Executing...</div>';

  const results=[];
  const t0=performance.now();
  const origLog=console.log;
  const allLogs=[];
  console.log=(...args)=>{allLogs.push(args.map(a=>{try{return JSON.stringify(a);}catch(e){return String(a);}}).join(' '));origLog(...args);};

  try{
    const factory=new Function((p.preamble||'')+'\n'+code+'\nif(typeof solution==="undefined")throw new Error("No function named \'solution\' found.");return solution;');
    const fn=factory();

    for(const tc of p.tests){
      const tcLogs=[];
      const prevLog=console.log;
      console.log=(...a)=>{tcLogs.push(a.map(x=>{try{return JSON.stringify(x);}catch(e){return String(x);}}).join(' '));prevLog(...a);};
      try{
        const rawArgs=JSON.parse(JSON.stringify(tc.args));
        const args=p.preArgs?p.preArgs(rawArgs):rawArgs;
        const rawResult=fn(...args);
        const result=p.postResult?p.postResult(rawResult):rawResult;
        const pass=deepEq(result,tc.expected,p.compare);
        results.push({pass,result,expected:tc.expected,label:tc.label,args:tc.args,logs:tcLogs});
      }catch(e){
        results.push({pass:false,error:e.message,label:tc.label,args:tc.args,logs:tcLogs});
      }finally{console.log=prevLog;}
    }
  }catch(e){
    console.log=origLog;
    statusEl.className='ra-status rs-err';
    statusEl.textContent='❌ Error';
    bodyEl.innerHTML=`<div style="color:var(--err);font-size:.8rem;padding:8px 0"><strong>Compile Error:</strong><pre style="font-family:monospace;margin-top:4px;color:var(--warn)">${escHtml(e.message)}</pre></div>`;
    return;
  }finally{console.log=origLog;}

  const elapsed=((performance.now()-t0)).toFixed(1);
  const allPass=results.every(r=>r.pass);
  const passCount=results.filter(r=>r.pass).length;

  if(allPass){
    statusEl.className='ra-status rs-pass';
    statusEl.textContent=`✅ All ${results.length} passed (${elapsed}ms)`;
    if(isSubmit){markSolved(p.id);showCelebration();}
  }else{
    statusEl.className='ra-status rs-fail';
    statusEl.textContent=`❌ ${passCount}/${results.length} passed`;
  }

  const rows=results.map((r,i)=>{
    const icon=r.pass?'✅':r.error?'💥':'❌';
    const color=r.pass?'var(--ok)':r.error?'var(--warn)':'var(--err)';
    const detail=r.error
      ?`<div style="color:var(--err);font-family:monospace;font-size:.75rem">${escHtml(r.error)}</div>`
      :`<div class="tc-detail">
          <span class="ek">Input: </span><span class="v">${escHtml(JSON.stringify(r.args))}</span><br>
          <span class="ek">Expected: </span><span class="v" style="color:var(--ok)">${escHtml(JSON.stringify(r.expected))}</span>
          ${!r.pass?`<br><span class="ek">Got: </span><span class="e">${escHtml(JSON.stringify(r.result))}</span>`:''}
        </div>
        ${r.logs&&r.logs.length?`<div class="console-out">${r.logs.map(escHtml).join('<br>')}</div>`:''}`;
    return `<div class="tc-row">
      <span class="tc-ico">${icon}</span>
      <div class="tc-info">
        <div class="tc-name" style="color:${color}">Test ${i+1}${r.label?' — '+r.label:''}</div>
        ${detail}
      </div>
    </div>`;
  }).join('');

  bodyEl.innerHTML=`<div style="padding:0">${rows}</div>`;
}

function showCelebration(){
  const m=document.getElementById('celebrate-modal');
  if(m){m.style.display='flex';}
}

/* ── RESIZER ─────────────────────────────────────────────────── */
function initResizer(){
  const r=document.getElementById('resizer');
  const left=document.getElementById('solve-left');
  const layout=document.getElementById('solve-layout');
  if(!r||!left)return;
  let dragging=false,startX=0,startW=0;
  r.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startW=left.offsetWidth;r.classList.add('dragging');});
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const delta=e.clientX-startX;
    const total=layout.offsetWidth;
    const newW=Math.max(280,Math.min(total-300,startW+delta));
    left.style.width=newW+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false;r.classList.remove('dragging');});
}

/* ── EVENTS ──────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  const navHome=document.getElementById('logo-home');if(navHome)navHome.addEventListener('click',go_dash);
  const cm=document.getElementById('celebrate-modal');
  if(cm){
    cm.addEventListener('click',e=>{if(e.target===cm)cm.style.display='none';});
    const cb=document.getElementById('celebrate-close');
    if(cb) cb.addEventListener('click',()=>cm.style.display='none');
    const nb=document.getElementById('celebrate-next');
    if(nb) nb.addEventListener('click',()=>{cm.style.display='none';go_problems(S.prob?S.prob.cat:'array');});
  }
  go_dash();
});

</script>

<div id="celebrate-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 3rem;text-align:center;max-width:420px">
    <div style="font-size:3rem">🎉</div>
    <h2 style="margin:.5rem 0;color:var(--success)">Problem Solved!</h2>
    <p style="color:var(--muted);margin-bottom:1.5rem">Great work! Keep the momentum going.</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button id="celebrate-close" style="padding:.6rem 1.4rem;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer">Stay Here</button>
      <button id="celebrate-next" style="padding:.6rem 1.4rem;border-radius:8px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-weight:600">Next Problem →</button>
    </div>
  </div>
</div>
